<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Prototype — descente</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
  <style>
    body {
      margin: 0;
      background-color: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    #game-wrapper { width: 400px; height: 700px; flex-shrink: 0; }
    canvas { border: 4px solid #0f0f1a; }
  </style>
</head>
<body>

  <div id="game-wrapper"></div>

<script>
  // Mise à l'échelle responsive
  (function(){
    function fit(){
      const w = document.getElementById('game-wrapper');
      const scale = Math.min(window.innerWidth / 400, window.innerHeight / 700);
      w.style.transform = 'scale(' + scale + ')';
    }
    window.addEventListener('resize', fit);
    window.addEventListener('load', fit);
    fit();
  })();

  // ============================================================
  // PROTOTYPE — juste pour tester si le principe est fun.
  // Format vertical (façon mobile), largeur 400 pour se rapprocher d'un
  // écran de téléphone.
  // ============================================================

  const WIDTH = 400, HEIGHT = 700;
  const BALL_Y = 160;
  const SEGMENTS = 5;
  const SEG_W = WIDTH / SEGMENTS;
  const ROW_H = 26;
  const ROW_GAP = 90; // espace vertical entre deux rangées

  var ball, cursors, rows = [], scrollSpeed = 90, score = 0, scoreText, gameOverText, isGameOver = false;
  var spawnTimer = 0;
  var ballTargetX;

  var config = {
    type: Phaser.AUTO,
    width: WIDTH,
    height: HEIGHT,
    parent: 'game-wrapper',
    backgroundColor: '#16213e',
    physics: { default: 'arcade' },
    scene: { preload, create, update }
  };
  new Phaser.Game(config);

  function preload(){}

  function create(){
    this.add.text(10, 10, 'Score', { fontSize: '14px', fill: '#888' });
    scoreText = this.add.text(10, 28, '0', { fontSize: '26px', fill: '#fff', fontStyle: 'bold' });

    ball = this.add.circle(WIDTH / 2, BALL_Y, 12, 0xffd166);
    ballTargetX = WIDTH / 2;

    cursors = this.input.keyboard.createCursorKeys();

    // Contrôle tactile : toucher la moitié gauche/droite de l'écran
    this.input.on('pointerdown', (pointer) => {
      if(isGameOver){ restart.call(this); return; }
      ballTargetX = (pointer.x < WIDTH / 2) ? Math.max(SEG_W/2, ball.x - SEG_W) : Math.min(WIDTH - SEG_W/2, ball.x + SEG_W);
    });

    gameOverText = this.add.text(WIDTH/2, HEIGHT/2, '', {
      fontSize: '22px', fill: '#fff', align: 'center', fontStyle: 'bold'
    }).setOrigin(0.5).setVisible(false);

    for(let i = 0; i < 5; i++){
      spawnRow.call(this, HEIGHT - i * ROW_GAP);
    }
  }

  function spawnRow(y){
    const gapIndex = Phaser.Math.Between(0, SEGMENTS - 1);
    const blocks = [];
    for(let i = 0; i < SEGMENTS; i++){
      if(i === gapIndex) continue; // le trou : rien à dessiner ici
      const rect = this.add.rectangle(i * SEG_W + SEG_W/2, y, SEG_W - 4, ROW_H, 0xe94560);
      blocks.push(rect);
    }
    rows.push({ y, gapIndex, blocks, passed: false });
  }

  function update(time, delta){
    if(isGameOver) return;

    const dt = delta / 1000;

    // Déplacement clavier (flèches) en plus du tactile
    if(cursors.left.isDown) ballTargetX = Math.max(SEG_W/2, ballTargetX - 300 * dt);
    if(cursors.right.isDown) ballTargetX = Math.min(WIDTH - SEG_W/2, ballTargetX + 300 * dt);

    ball.x = Phaser.Math.Linear(ball.x, ballTargetX, 0.25);

    // La difficulté augmente doucement avec le score
    scrollSpeed = 90 + score * 4;

    rows.forEach(row => {
      row.y -= scrollSpeed * dt;
      row.blocks.forEach(b => b.y = row.y);

      // La rangée vient de croiser la hauteur de la bille : on vérifie
      // si elle passe par le trou ou percute un bloc.
      if(!row.passed && row.y <= BALL_Y){
        row.passed = true;
        const ballSegment = Math.floor(ball.x / SEG_W);
        if(ballSegment !== row.gapIndex){
          triggerGameOver.call(this);
        } else {
          score++;
          scoreText.setText(score);
        }
      }
    });

    // Nettoyage des rangées sorties de l'écran + génération de nouvelles
    rows = rows.filter(row => {
      if(row.y < -ROW_H){
        row.blocks.forEach(b => b.destroy());
        return false;
      }
      return true;
    });

    spawnTimer += dt * scrollSpeed;
    if(spawnTimer >= ROW_GAP){
      spawnTimer = 0;
      const lastY = rows.length ? rows[rows.length - 1].y : HEIGHT;
      spawnRow.call(this, lastY - ROW_GAP + scrollSpeed * dt);
    }
  }

  function triggerGameOver(){
    isGameOver = true;
    gameOverText.setText('Perdu !\nScore : ' + score + '\n\nToucher / Espace pour rejouer').setVisible(true);
    this.input.keyboard.once('keydown-SPACE', () => restart.call(this));
  }

  function restart(){
    rows.forEach(row => row.blocks.forEach(b => b.destroy()));
    rows = [];
    score = 0;
    scoreText.setText('0');
    scrollSpeed = 90;
    spawnTimer = 0;
    ball.x = WIDTH / 2;
    ballTargetX = WIDTH / 2;
    gameOverText.setVisible(false);
    isGameOver = false;
    for(let i = 0; i < 5; i++){
      spawnRow.call(this, HEIGHT - i * ROW_GAP);
    }
  }
</script>
</body>
</html>
