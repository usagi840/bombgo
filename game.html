<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jeu 2 joueurs</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>

<style>
body {
  margin: 0;
  background-color: #413d3d;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
canvas { border: 4px solid #291515; }
</style>

</head>

<body>
<div id="game-wrapper"></div>

<script>
'use strict';

// =================================================================
// CONFIGURATION DES MANETTES
// =================================================================
// La config est produite par config.html et stockée dans localStorage
// sous la forme :
// {
//   p1: { padIndex: number|null, axis: number, jump: number },
//   p2: { padIndex: number|null, axis: number, jump: number }
// }
// padIndex = index natif de la manette (permet de savoir EXACTEMENT
// quelle manette physique appartient à quel joueur, plutôt que de se
// fier à l'ordre de connexion qui n'est pas fiable).
// =================================================================

const STORAGE_KEY = 'gamepadConfig';
const DEADZONE = 0.2;

const DEFAULT_PLAYER_CONFIG = { padIndex: null, axis: 0, jump: 0 };

let playerConfig = {
  p1: { ...DEFAULT_PLAYER_CONFIG },
  p2: { ...DEFAULT_PLAYER_CONFIG }
};

let configWasLoaded = false;

function loadGamepadConfig() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (raw && raw.p1 && raw.p2) {
      playerConfig.p1 = {
        padIndex: raw.p1.padIndex ?? null,
        axis: raw.p1.axis ?? 0,
        jump: raw.p1.jump ?? 0
      };
      playerConfig.p2 = {
        padIndex: raw.p2.padIndex ?? null,
        axis: raw.p2.axis ?? 0,
        jump: raw.p2.jump ?? 0
      };
      configWasLoaded = true;
      return;
    }
  } catch (e) { /* config absente ou invalide -> valeurs par défaut */ }
  console.warn('[gamepad] Aucune configuration trouvée dans localStorage. ' +
               'Ouvrez config.html pour configurer vos manettes. ' +
               'Valeurs par défaut utilisées : axe 0 / bouton 0.');
}

loadGamepadConfig();

// =================================================================
// ETAT DU JEU
// =================================================================

var player1, player2, stars, bombs, platforms;
var score = 0, scoreText;
var lives = 3, lifeIcons = [];
var gameOver = false;

// Références runtime des manettes Phaser assignées à chaque joueur.
// Peuvent être null à tout moment (manette non branchée / débranchée) :
// tout le code doit tolérer null sans planter.
var pad1 = null, pad2 = null;

var warningText = null;
var debugText = null;
var debugOn = false;
var dKey = null;

var config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  physics: { default: 'arcade', arcade: { gravity: { y: 300 } } },
  input: { gamepad: true },
  scene: { preload, create, update }
};

new Phaser.Game(config);

function preload() {
  this.load.image('sky', 'assets/sky.png');
  this.load.image('ground', 'assets/platform.png');
  this.load.image('star', 'assets/piece1.png');
  this.load.image('bomb', 'assets/bombe.png');
  this.load.image('vie', 'assets/vie1.png');
  this.load.image('novie', 'assets/vie2.png');

  this.load.spritesheet('dude1', 'assets/personnageframe1.png', { frameWidth: 320, frameHeight: 480 });
  this.load.spritesheet('dude2', 'assets/personnageframe2.png', { frameWidth: 320, frameHeight: 480 });
}

function create() {
  this.add.image(400, 300, 'sky');

  scoreText = this.add.text(16, 16, 'Score: 0', { fontSize: '32px', fill: '#000' });

  for (let i = 0; i < lives; i++) {
    lifeIcons.push(this.add.image(40 + i * 45, 70, 'vie').setScale(0.02));
  }

  platforms = this.physics.add.staticGroup();
  platforms.create(400, 568, 'ground').setScale(2).refreshBody();

  player1 = this.physics.add.sprite(100, 450, 'dude1').setScale(0.125).setBounce(0.2).setCollideWorldBounds(true);
  player2 = this.physics.add.sprite(700, 450, 'dude2').setScale(0.125).setBounce(0.2).setCollideWorldBounds(true);

  this.anims.create({ key: 'left1', frames: this.anims.generateFrameNumbers('dude1', { start: 0, end: 3 }), frameRate: 10, repeat: -1 });
  this.anims.create({ key: 'turn1', frames: [{ key: 'dude1', frame: 4 }], frameRate: 20 });
  this.anims.create({ key: 'right1', frames: this.anims.generateFrameNumbers('dude1', { start: 5, end: 8 }), frameRate: 10, repeat: -1 });

  this.anims.create({ key: 'left2', frames: this.anims.generateFrameNumbers('dude2', { start: 0, end: 3 }), frameRate: 10, repeat: -1 });
  this.anims.create({ key: 'turn2', frames: [{ key: 'dude2', frame: 4 }], frameRate: 20 });
  this.anims.create({ key: 'right2', frames: this.anims.generateFrameNumbers('dude2', { start: 5, end: 8 }), frameRate: 10, repeat: -1 });

  stars = this.physics.add.group({ key: 'star', repeat: 11, setXY: { x: 12, y: 0, stepX: 70 } });
  stars.children.iterate(c => { c.setBounceY(Phaser.Math.FloatBetween(0.4, 0.8)); c.setScale(0.015); });

  bombs = this.physics.add.group();

  this.physics.add.collider(player1, platforms);
  this.physics.add.collider(player2, platforms);
  this.physics.add.collider(stars, platforms);
  this.physics.add.collider(bombs, platforms);

  this.physics.add.overlap(player1, stars, collectStar, null, this);
  this.physics.add.overlap(player2, stars, collectStar, null, this);

  this.physics.add.collider(player1, bombs, hitBomb, null, this);
  this.physics.add.collider(player2, bombs, hitBomb, null, this);

  // --- Avertissement si aucune config n'a été trouvée ---
  if (!configWasLoaded) {
    warningText = this.add.text(400, 590, "Aucune config manette trouvée — ouvrez config.html", {
      fontSize: '14px', fill: '#ff6b6b'
    }).setOrigin(0.5, 1);
  }

  // --- Debug overlay (touche D) ---
  debugText = this.add.text(16, 460, '', { fontSize: '13px', fill: '#00ff00', backgroundColor: '#000000aa' });
  debugText.setVisible(false);
  dKey = this.input.keyboard.addKey('D');

  // --- Assignation des manettes selon la config ---
  assignPads(this.input.gamepad.gamepads);

  this.input.gamepad.on('connected', (pad) => {
    console.log('[gamepad] connectée :', pad.index, pad.id);
    assignPads(this.input.gamepad.gamepads);
  });

  this.input.gamepad.on('disconnected', (pad) => {
    console.log('[gamepad] déconnectée :', pad.index, pad.id);
    if (pad1 === pad) pad1 = null;
    if (pad2 === pad) pad2 = null;
  });
}

// -----------------------------------------------------------------
// Associe les manettes Phaser réellement connectées aux joueurs,
// en priorité via le padIndex sauvegardé dans la config. Si un
// joueur n'a pas de padIndex configuré (config absente/partielle),
// on retombe sur un assignement par ordre de connexion.
// -----------------------------------------------------------------
function assignPads(gamepadList) {
  const pads = gamepadList.filter(p => p);

  // 1) tentative de correspondance stricte par padIndex
  pads.forEach(pad => {
    if (playerConfig.p1.padIndex !== null && pad.index === playerConfig.p1.padIndex) {
      pad1 = pad;
    }
    if (playerConfig.p2.padIndex !== null && pad.index === playerConfig.p2.padIndex) {
      pad2 = pad;
    }
  });

  // 2) fallback par ordre de connexion pour les joueurs sans padIndex configuré
  if (playerConfig.p1.padIndex === null && !pad1) {
    pad1 = pads.find(p => p !== pad2) || null;
  }
  if (playerConfig.p2.padIndex === null && !pad2) {
    pad2 = pads.find(p => p !== pad1) || null;
  }
}

function update() {
  if (Phaser.Input.Keyboard.JustDown(dKey)) {
    debugOn = !debugOn;
    debugText.setVisible(debugOn);
  }
  if (debugOn) {
    debugText.setText(getDebugInfo());
  }

  if (gameOver) return;

  movePlayer(player1, pad1, playerConfig.p1, { left: 'left1', turn: 'turn1', right: 'right1' });
  movePlayer(player2, pad2, playerConfig.p2, { left: 'left2', turn: 'turn2', right: 'right2' });
}

// -----------------------------------------------------------------
// movePlayer(player, pad, config, anims)
// -----------------------------------------------------------------
// - player : sprite Phaser du joueur
// - pad    : objet Gamepad Phaser (this.input.gamepad.*), ou null
// - config : { padIndex, axis, jump } propre à ce joueur
// - anims  : { left, turn, right } clés d'animation propres à ce joueur
//
// Contraintes respectées :
// - n'utilise QUE pad.axes[] et pad.buttons[] (pas de pad.leftStick)
// - tolère pad === null ou config === null sans planter
// - deadzone fixe de 0.2
// -----------------------------------------------------------------
function movePlayer(player, pad, cfg, anims) {
  if (!pad || !pad.connected || !cfg) {
    if (player && player.body) player.setVelocityX(0);
    if (player && player.anims) player.anims.play(anims.turn, true);
    return;
  }

  const axisIndex = cfg.axis ?? 0;
  const jumpIndex = cfg.jump ?? 0;

  const axisObj = pad.axes && pad.axes[axisIndex];
  const value = axisObj ? axisObj.getValue() : 0;

  if (value < -DEADZONE) {
    player.setVelocityX(-160);
    player.anims.play(anims.left, true);
  } else if (value > DEADZONE) {
    player.setVelocityX(160);
    player.anims.play(anims.right, true);
  } else {
    player.setVelocityX(0);
    player.anims.play(anims.turn, true);
  }

  const jumpBtn = pad.buttons && pad.buttons[jumpIndex];
  if (jumpBtn && jumpBtn.pressed && player.body.touching.down) {
    player.setVelocityY(-330);
  }
}

function getDebugInfo() {
  const lines = [];
  [['P1', pad1, playerConfig.p1], ['P2', pad2, playerConfig.p2]].forEach(([label, pad, cfg]) => {
    if (!pad) {
      lines.push(`${label}: manette non connectée (padIndex attendu: ${cfg.padIndex})`);
      return;
    }
    const axisVal = pad.axes[cfg.axis] ? pad.axes[cfg.axis].getValue().toFixed(2) : 'n/a';
    const jumpPressed = pad.buttons[cfg.jump] ? pad.buttons[cfg.jump].pressed : 'n/a';
    lines.push(`${label}: pad#${pad.index} (${pad.id.slice(0, 24)})`);
    lines.push(`   axis=${cfg.axis} val=${axisVal}  jumpBtn=${cfg.jump} pressed=${jumpPressed}`);
  });
  lines.push('(D pour cacher)');
  return lines.join('\n');
}

function collectStar(player, star) {
  star.disableBody(true, true);
  score += 10;
  scoreText.setText('Score: ' + score);

  if (stars.countActive(true) === 0) {
    stars.children.iterate(c => c.enableBody(true, c.x, 0, true, true));

    let x = (player.x < 400) ? Phaser.Math.Between(400, 800) : Phaser.Math.Between(0, 400);
    let bomb = bombs.create(x, 16, 'bomb').setScale(0.015);
    bomb.setBounce(1).setCollideWorldBounds(true).setVelocity(Phaser.Math.Between(-200, 200), 20);
  }
}

function hitBomb(player, bomb) {
  bomb.disableBody(true, true);
  lives--;

  if (lives >= 0) {
    lifeIcons[lives].setTexture('novie').setScale(0.02);
  }

  if (lives <= 0 && !gameOver) {
    gameOver = true;
    this.physics.pause();
    player.setTint(0xff0000);
  }
}
</script>

</body>
</html>
