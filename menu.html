<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Menu</title>
  <style>
    body {
      margin: 0;
      background-color: #413d3d;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
    }
    #wrapper {
      border: 4px solid #291515;
      width: 800px;
      height: 600px;
      background-color: #7ec4cf;
      display: flex;
      flex-direction: column;
    }
    h1 {
      text-align: center;
      color: #291515;
      margin: 12px 0 4px;
      font-size: 26px;
    }
    #columns {
      display: flex;
      flex: 1;
      gap: 16px;
      padding: 0 16px 16px;
      box-sizing: border-box;
    }
    .player-column {
      flex: 1;
      background-color: rgba(255,255,255,0.55);
      border-radius: 10px;
      padding: 14px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .player-title {
      font-size: 20px;
      font-weight: bold;
      color: #291515;
    }
    .connect-status {
      font-size: 14px;
      color: #291515;
      text-align: center;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.06);
      border-radius: 6px;
      padding: 6px 8px;
      width: 100%;
      box-sizing: border-box;
    }
    .connect-status.connected {
      background: rgba(46,139,46,0.25);
      font-weight: bold;
    }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #999;
      text-align: center;
    }
    .skin-picker {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      width: 100%;
    }
    .skin-thumb {
      width: 100%;
      aspect-ratio: 320 / 480;
      background-repeat: no-repeat;
      background-position: 0 0;
      background-size: auto 100%;
      border: 3px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      background-color: rgba(255,255,255,0.6);
      overflow: hidden;
    }
    .skin-thumb:hover {
      border-color: #999;
    }
    .skin-thumb.selected {
      border-color: #2e8b2e;
    }
    #bottom-bar {
      height: 64px;
      background-color: #291515;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }
    #play-btn {
      font-size: 20px;
      padding: 10px 32px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background-color: #f2d16b;
      font-weight: bold;
    }
    #play-btn:disabled {
      background-color: #777;
      color: #ccc;
      cursor: not-allowed;
    }
    #play-btn:not(:disabled):hover {
      background-color: #e0bd50;
    }
  </style>
</head>
<body>

  <div id="wrapper">
    <h1>Menu — connecte-toi et choisis ton skin</h1>
    <div id="columns">
      <div class="player-column">
        <div class="player-title">Joueur 1</div>
        <div class="connect-status" id="status1">Appuie sur SR pour te connecter</div>
        <input type="text" id="pseudo1" maxlength="16" placeholder="Ton pseudo">
        <div class="skin-picker" id="skins1"></div>
      </div>
      <div class="player-column">
        <div class="player-title">Joueur 2</div>
        <div class="connect-status" id="status2">Appuie sur SR pour te connecter</div>
        <input type="text" id="pseudo2" maxlength="16" placeholder="Ton pseudo">
        <div class="skin-picker" id="skins2"></div>
      </div>
    </div>
    <div id="bottom-bar">
      <button id="play-btn" disabled>Jouer</button>
    </div>
  </div>

<script>
  // ==== État ====
  // padIndex: à quel index (dans navigator.getGamepads()) se trouve la
  // manette de ce joueur. axisIndex/jumpButton/invertX/useDpadFallback:
  // les réglages de mouvement à utiliser une fois en jeu (repris tels
  // quels par solo.html).
  const state = {
    player1: { connected: false, padIndex: null, axisIndex: 0, jumpButton: 12, invertX: false, useDpadFallback: true, pseudo: '', skin: 1 },
    player2: { connected: false, padIndex: null, axisIndex: 0, jumpButton: 2, invertX: false, useDpadFallback: true, pseudo: '', skin: 2 }
  };

  let joinStage = 'p1assign'; // 'p1assign' -> 'p2assign' -> 'done'
  let prevButtons = {};

  // ==== Pseudos : on reprend ceux sauvegardés la dernière fois, sinon vide ====
  const savedPseudo1 = localStorage.getItem('player1Pseudo') || '';
  const savedPseudo2 = localStorage.getItem('player2Pseudo') || '';
  document.getElementById('pseudo1').value = savedPseudo1;
  document.getElementById('pseudo2').value = savedPseudo2;
  state.player1.pseudo = savedPseudo1;
  state.player2.pseudo = savedPseudo2;

  document.getElementById('pseudo1').addEventListener('input', e => {
    state.player1.pseudo = e.target.value;
    localStorage.setItem('player1Pseudo', e.target.value);
  });
  document.getElementById('pseudo2').addEventListener('input', e => {
    state.player2.pseudo = e.target.value;
    localStorage.setItem('player2Pseudo', e.target.value);
  });

  // ==== Sélecteur de skins (4 vignettes par joueur) ====
  const savedSkin1 = parseInt(localStorage.getItem('player1Skin'), 10) || 1;
  const savedSkin2 = parseInt(localStorage.getItem('player2Skin'), 10) || 2;
  state.player1.skin = savedSkin1;
  state.player2.skin = savedSkin2;

  function buildSkinPicker(containerId, playerKey, defaultSkin){
    const container = document.getElementById(containerId);
    for(let i = 1; i <= 4; i++){
      const thumb = document.createElement('div');
      thumb.className = 'skin-thumb' + (i === defaultSkin ? ' selected' : '');
      thumb.style.backgroundImage = "url('assets/personnage" + i + ".png')";
      thumb.dataset.skin = i;
      thumb.addEventListener('click', () => {
        state[playerKey].skin = i;
        localStorage.setItem(playerKey + 'Skin', i);
        container.querySelectorAll('.skin-thumb').forEach(t => t.classList.remove('selected'));
        thumb.classList.add('selected');
      });
      container.appendChild(thumb);
    }
  }
  buildSkinPicker('skins1', 'player1', savedSkin1);
  buildSkinPicker('skins2', 'player2', savedSkin2);

  // ==== Détection des manettes (bouton SR pour se connecter) ====
  // Comme dans solo.html : si une seule manette physique est détectée
  // (2 Joy-Con fusionnés par Windows), on exige précisément le bouton SR
  // de gauche (index 19) pour le Joueur 1 et celui de droite (index 21)
  // pour le Joueur 2, afin de bien séparer les deux moitiés. S'il y a 2
  // manettes séparées, n'importe quel bouton suffit pour se connecter.
  const statusEl = { player1: document.getElementById('status1'), player2: document.getElementById('status2') };
  const playBtn = document.getElementById('play-btn');

  function updateStatusText(){
    const connectedCount = Object.values(navigator.getGamepads ? navigator.getGamepads() : []).filter(p => p).length;

    if(joinStage === 'p1assign'){
      statusEl.player1.textContent = (connectedCount === 1)
        ? 'Appuie sur SR (gauche) pour te connecter'
        : 'Appuie sur SR pour te connecter';
    } else if(joinStage === 'p2assign'){
      const sameCombinedPad = (connectedCount === 1);
      statusEl.player2.textContent = sameCombinedPad
        ? 'Appuie sur SR (droite) pour te connecter'
        : 'Appuie sur SR pour te connecter';
    }
  }
  updateStatusText();

  function pollGamepads(){
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    const connectedCount = Array.from(pads).filter(p => p).length;

    for(let index = 0; index < pads.length; index++){
      const pad = pads[index];
      if(!pad) continue;

      for(let btnIndex = 0; btnIndex < pad.buttons.length; btnIndex++){
        const pressed = pad.buttons[btnIndex].pressed;
        const key = index + '_' + btnIndex;
        const wasPressed = prevButtons[key] || false;
        const justPressed = pressed && !wasPressed;
        prevButtons[key] = pressed;

        if(!justPressed) continue;

        if(joinStage === 'p1assign' && index !== state.player2.padIndex){
          if(connectedCount === 1 && btnIndex !== 19) continue;

          state.player1.connected = true;
          state.player1.padIndex = index;
          // Cas manette combinée (SR gauche) : axe Y du stick gauche,
          // bouton 19 pour sauter, pas d'inversion, pas de croix fallback.
          // Cas manette séparée : réglages génériques par défaut.
          if(connectedCount === 1){
            state.player1.axisIndex = 1;
            state.player1.jumpButton = 19;
            state.player1.invertX = false;
            state.player1.useDpadFallback = false;
          } else {
            state.player1.axisIndex = 0;
            state.player1.jumpButton = 12;
            state.player1.invertX = false;
            state.player1.useDpadFallback = true;
          }
          statusEl.player1.textContent = 'Connecté ✓';
          statusEl.player1.classList.add('connected');
          joinStage = 'p2assign';
          updateStatusText();
          break;
        } else if(joinStage === 'p2assign'){
          const sameCombinedPad = (index === state.player1.padIndex);
          if(sameCombinedPad && btnIndex !== 21) continue;
          if(!sameCombinedPad && index === state.player1.padIndex) continue;

          state.player2.connected = true;
          state.player2.padIndex = index;
          if(sameCombinedPad){
            state.player2.axisIndex = 3;
            state.player2.jumpButton = 21;
            state.player2.invertX = true;
            state.player2.useDpadFallback = false;
          } else {
            state.player2.axisIndex = 0;
            state.player2.jumpButton = 2;
            state.player2.invertX = false;
            state.player2.useDpadFallback = true;
          }
          statusEl.player2.textContent = 'Connecté ✓';
          statusEl.player2.classList.add('connected');
          joinStage = 'done';
          break;
        }
      }
    }

    playBtn.disabled = !(state.player1.connected && state.player2.connected);

    requestAnimationFrame(pollGamepads);
  }
  requestAnimationFrame(pollGamepads);

  // ==== Bouton Jouer : on sauvegarde tout et on part sur solo.html ====
  playBtn.addEventListener('click', () => {
    const config = {
      player1: {
        padIndex: state.player1.padIndex,
        axisIndex: state.player1.axisIndex,
        jumpButton: state.player1.jumpButton,
        invertX: state.player1.invertX,
        useDpadFallback: state.player1.useDpadFallback,
        pseudo: state.player1.pseudo || 'Joueur 1',
        skin: state.player1.skin
      },
      player2: {
        padIndex: state.player2.padIndex,
        axisIndex: state.player2.axisIndex,
        jumpButton: state.player2.jumpButton,
        invertX: state.player2.invertX,
        useDpadFallback: state.player2.useDpadFallback,
        pseudo: state.player2.pseudo || 'Joueur 2',
        skin: state.player2.skin
      }
    };
    localStorage.setItem('joyconGameConfig', JSON.stringify(config));
    window.location.href = 'solo.html';
  });
</script>
</body>
</html>
