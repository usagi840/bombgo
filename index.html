<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Menu</title>
  <style>
    body {
      margin: 0;
      background-color: #413d3d;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
    }
    #wrapper {
      border: 4px solid #291515;
      width: 800px;
      height: 600px;
      background-color: #7ec4cf;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      overflow: hidden;
    }
    h1 {
      text-align: center;
      color: #291515;
      margin: 8px 0 2px;
      font-size: 20px;
    }
    #columns {
      display: flex;
      flex: 1;
      gap: 14px;
      padding: 8px 14px;
      box-sizing: border-box;
      min-height: 0;
    }
    .player-column {
      flex: 1;
      background-color: rgba(255,255,255,0.55);
      border-radius: 10px;
      padding: 10px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .player-title {
      font-size: 17px;
      font-weight: bold;
      color: #291515;
    }
    .connect-status {
      font-size: 13px;
      color: #291515;
      text-align: center;
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.06);
      border-radius: 6px;
      padding: 4px 8px;
      width: 100%;
      box-sizing: border-box;
    }
    .connect-status.connected {
      background: rgba(46,139,46,0.25);
      font-weight: bold;
    }
    .connect-status.ready {
      background: rgba(46,139,46,0.55);
    }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 6px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #999;
      text-align: center;
    }
    .skin-picker {
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 6px;
      width: 100%;
    }
    .skin-thumb {
      width: 62px;
      height: 84px;
      flex: 0 0 auto;
      background-repeat: no-repeat;
      background-position: 0 0;
      background-size: auto 84px;
      border: 3px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      background-color: rgba(255,255,255,0.6);
      overflow: hidden;
    }
    .skin-thumb:hover {
      border-color: #999;
    }
    .skin-thumb.selected {
      border-color: #2e8b2e;
    }
    .hint {
      font-size: 11px;
      color: #291515;
      opacity: 0.75;
      text-align: center;
    }
    #bottom-bar {
      height: 56px;
      background-color: #291515;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex: 0 0 auto;
    }
    #play-btn {
      font-size: 18px;
      padding: 8px 28px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background-color: #f2d16b;
      font-weight: bold;
    }
    #play-btn:disabled {
      background-color: #777;
      color: #ccc;
      cursor: not-allowed;
    }
    #play-btn:not(:disabled):hover {
      background-color: #e0bd50;
    }
  </style>
</head>
<body>

  <div id="wrapper">
    <h1>Menu — connecte-toi et choisis ton skin</h1>
    <div id="columns">
      <div class="player-column">
        <div class="player-title">Joueur 1</div>
        <div class="connect-status" id="status1">Appuie sur SR pour te connecter</div>
        <input type="text" id="pseudo1" maxlength="16" placeholder="Ton pseudo">
        <div class="skin-picker" id="skins1"></div>
        <div class="hint">Stick ← → pour changer de skin, ton bouton SR pour valider / lancer</div>
      </div>
      <div class="player-column">
        <div class="player-title">Joueur 2</div>
        <div class="connect-status" id="status2">Appuie sur SR pour te connecter</div>
        <input type="text" id="pseudo2" maxlength="16" placeholder="Ton pseudo">
        <div class="skin-picker" id="skins2"></div>
        <div class="hint">Stick ← → pour changer de skin, ton bouton SR pour valider / lancer</div>
      </div>
    </div>

  </div>

<script>
  // ==== État ====
  const state = {
    player1: { connected: false, ready: false, padIndex: null, axisIndex: 0, jumpButton: 12, invertX: false, useDpadFallback: true, pseudo: '', skin: 1 },
    player2: { connected: false, ready: false, padIndex: null, axisIndex: 0, jumpButton: 2,  invertX: false, useDpadFallback: true, pseudo: '', skin: 2 }
  };

  let prevButtons = {};
  let launching = false;
  const axisTapState = {
    player1: { pos: false, neg: false },
    player2: { pos: false, neg: false }
  };

  // ==== Pseudos : "Joueur 1"/"Joueur 2" pré-remplis par défaut, ou ceux
  // sauvegardés la dernière fois si présents. Toujours modifiables. ====
  const savedPseudo1 = localStorage.getItem('player1Pseudo') || 'Joueur 1';
  const savedPseudo2 = localStorage.getItem('player2Pseudo') || 'Joueur 2';
  document.getElementById('pseudo1').value = savedPseudo1;
  document.getElementById('pseudo2').value = savedPseudo2;
  state.player1.pseudo = savedPseudo1;
  state.player2.pseudo = savedPseudo2;

  document.getElementById('pseudo1').addEventListener('input', e => {
    state.player1.pseudo = e.target.value;
    localStorage.setItem('player1Pseudo', e.target.value);
  });
  document.getElementById('pseudo2').addEventListener('input', e => {
    state.player2.pseudo = e.target.value;
    localStorage.setItem('player2Pseudo', e.target.value);
  });

  // ==== Sélecteur de skins (4 vignettes par joueur, cliquables ou via stick) ====
  const savedSkin1 = parseInt(localStorage.getItem('player1Skin'), 10) || 1;
  const savedSkin2 = parseInt(localStorage.getItem('player2Skin'), 10) || 2;
  state.player1.skin = savedSkin1;
  state.player2.skin = savedSkin2;

  function buildSkinPicker(containerId, playerKey, defaultSkin){
    const container = document.getElementById(containerId);
    for(let i = 1; i <= 4; i++){
      const thumb = document.createElement('div');
      thumb.className = 'skin-thumb' + (i === defaultSkin ? ' selected' : '');
      thumb.style.backgroundImage = "url('assets/personnage" + i + ".png')";
      thumb.dataset.skin = i;
      thumb.addEventListener('click', () => setSkin(playerKey, i));
      container.appendChild(thumb);
    }
  }
  buildSkinPicker('skins1', 'player1', savedSkin1);
  buildSkinPicker('skins2', 'player2', savedSkin2);

  function setSkin(playerKey, skinNumber){
    state[playerKey].skin = skinNumber;
    localStorage.setItem(playerKey + 'Skin', skinNumber);
    document.querySelectorAll('#skins' + playerKey.slice(-1) + ' .skin-thumb').forEach(t => {
      t.classList.toggle('selected', parseInt(t.dataset.skin, 10) === skinNumber);
    });
  }

  function cycleSkin(playerKey, direction){
    const current = state[playerKey].skin;
    const next = ((current - 1 + direction + 4) % 4) + 1;
    setSkin(playerKey, next);
  }

  // ==== Connexion manette ====
  const statusEl = { player1: document.getElementById('status1'), player2: document.getElementById('status2') };
  const playBtn = document.getElementById('play-btn');

  function updateStatusText(){
    if(!state.player1.connected) statusEl.player1.textContent = 'Appuie sur SR pour te connecter';
    if(!state.player2.connected) statusEl.player2.textContent = 'Appuie sur SR pour te connecter';
  }
  updateStatusText();

  function connectPlayer(playerKey, padIndex, cfg){
    state[playerKey].connected = true;
    state[playerKey].padIndex = padIndex;
    state[playerKey].axisIndex = cfg.axisIndex;
    state[playerKey].jumpButton = cfg.jumpButton;
    state[playerKey].invertX = cfg.invertX;
    state[playerKey].useDpadFallback = cfg.useDpadFallback;
    statusEl[playerKey].textContent = 'Connecté ✓ — rebouge le stick pour changer de skin, rappuie pour valider';
    statusEl[playerKey].classList.add('connected');
    checkPlayBtn();
  }

  function togglePlayerReady(playerKey){
    if(!state[playerKey].connected) return;
    state[playerKey].ready = !state[playerKey].ready;
    if(state[playerKey].ready){
      statusEl[playerKey].textContent = 'Prêt ✓';
      statusEl[playerKey].classList.add('ready');
    } else {
      statusEl[playerKey].textContent = 'Connecté ✓ — rebouge le stick pour changer de skin, rappuie pour valider';
      statusEl[playerKey].classList.remove('ready');
    }
    checkPlayBtn();
    maybeAutoLaunch();
  }

  function checkPlayBtn(){
    playBtn.disabled = !(state.player1.connected && state.player2.connected);
  }

  function maybeAutoLaunch(){
    if(launching) return;
    if(state.player1.connected && state.player2.connected && state.player1.ready && state.player2.ready){
      launchGame();
    }
  }

  function pollGamepads(){
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    const connectedCount = Array.from(pads).filter(p => p).length;

    for(let index = 0; index < pads.length; index++){
      const pad = pads[index];
      if(!pad) continue;

      for(let btnIndex = 0; btnIndex < pad.buttons.length; btnIndex++){
        const pressed = pad.buttons[btnIndex].pressed;
        const key = index + '_' + btnIndex;
        const wasPressed = prevButtons[key] || false;
        const justPressed = pressed && !wasPressed;
        prevButtons[key] = pressed;

        if(!justPressed) continue;

        if(connectedCount === 1){
          // Manette combinée (2 Joy-Con fusionnés) : bouton 19 = côté
          // Joueur 1, bouton 21 = côté Joueur 2. Peu importe lequel des
          // deux appuie en premier, chaque bouton assigne toujours le même
          // joueur — l'ordre de connexion n'a donc aucune importance.
          if(btnIndex === 19){
            if(!state.player1.connected){
              connectPlayer('player1', index, { axisIndex: 1, jumpButton: 19, invertX: false, useDpadFallback: false });
            } else {
              togglePlayerReady('player1');
            }
          } else if(btnIndex === 21){
            if(!state.player2.connected){
              connectPlayer('player2', index, { axisIndex: 3, jumpButton: 21, invertX: true, useDpadFallback: false });
            } else {
              togglePlayerReady('player2');
            }
          }
        } else {
          // Manettes séparées : si cette manette est déjà connectée à un
          // joueur, ce bouton sert à valider/dévalider "prêt" pour ce
          // joueur. Sinon, elle rejoint le premier joueur encore libre
          // (peu importe l'ordre : la première manette qui bouge prend la
          // première place libre, la seconde prend l'autre).
          if(index === state.player1.padIndex){
            togglePlayerReady('player1');
          } else if(index === state.player2.padIndex){
            togglePlayerReady('player2');
          } else if(!state.player1.connected){
            connectPlayer('player1', index, { axisIndex: 0, jumpButton: 12, invertX: false, useDpadFallback: true });
          } else if(!state.player2.connected){
            connectPlayer('player2', index, { axisIndex: 0, jumpButton: 2, invertX: false, useDpadFallback: true });
          }
        }
      }
    }

    // ==== Changement de skin au stick pour les joueurs déjà connectés
    // (mais pas encore "prêts", pour éviter de changer par erreur une
    // fois validé) ====
    ['player1', 'player2'].forEach(playerKey => {
      const p = state[playerKey];
      if(!p.connected || p.ready) return;
      const pad = pads[p.padIndex];
      if(!pad) return;
      const axisVal = pad.axes[p.axisIndex];
      if(axisVal === undefined) return;

      let val = axisVal;
      if(p.invertX) val = -val;

      const threshold = 0.6;
      const tap = axisTapState[playerKey];

      if(val > threshold && !tap.pos){
        cycleSkin(playerKey, 1);
        tap.pos = true;
      } else if(val < threshold * 0.5){
        tap.pos = false;
      }

      if(val < -threshold && !tap.neg){
        cycleSkin(playerKey, -1);
        tap.neg = true;
      } else if(val > -threshold * 0.5){
        tap.neg = false;
      }
    });

    requestAnimationFrame(pollGamepads);
  }
  requestAnimationFrame(pollGamepads);

  // ==== Lancement (bouton souris, ou automatique quand les 2 sont prêts) ====
  function launchGame(){
    if(launching) return;
    launching = true;

    const config = {
      player1: {
        padIndex: state.player1.padIndex,
        axisIndex: state.player1.axisIndex,
        jumpButton: state.player1.jumpButton,
        invertX: state.player1.invertX,
        useDpadFallback: state.player1.useDpadFallback,
        pseudo: state.player1.pseudo || 'Joueur 1',
        skin: state.player1.skin
      },
      player2: {
        padIndex: state.player2.padIndex,
        axisIndex: state.player2.axisIndex,
        jumpButton: state.player2.jumpButton,
        invertX: state.player2.invertX,
        useDpadFallback: state.player2.useDpadFallback,
        pseudo: state.player2.pseudo || 'Joueur 2',
        skin: state.player2.skin
      }
    };
    localStorage.setItem('joyconGameConfig', JSON.stringify(config));
    window.location.href = 'game.html';
  }

  playBtn.addEventListener('click', launchGame);
</script>
</body>
</html>
