<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>2 Joueurs</title>
  <link rel="icon" type="image/png" sizes="64x64" href="./favicon.png">

  <!-- Phaser -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      background-color: #413d3d;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas { border: 4px solid #291515; }

    /* Les icônes en haut */
    .icon { cursor:pointer; width:105px; position:fixed; top:10px; }
    .icon.home { left:10px; }
    .icon.retour { left:125px; }
    .icon.refresh { right:10px; }
  </style>
</head>
<body>

  <img src="assets/logohome.png" class="icon home" onclick="window.location.href='./index.html'">
  <img src="assets/logoretour.png" class="icon retour" onclick="window.location.href='./index.html'">
  <img src="assets/logorefresh.png" class="icon refresh" onclick="window.location.href='./2joueurs.html'">

  <div id="game-wrapper"></div>

<script>
  // ==== Firebase ====
  firebase.initializeApp({
    apiKey: "AIzaSyBnQb5b5h62Jl4WeiKEBMeEmivbOK-B70k",
    authDomain: "bombgo-classement.firebaseapp.com",
    projectId: "bombgo-classement",
    appId: "1:113313571513:web:73863b02df8193606ef168"
  });
  const db = firebase.firestore();

  // ==== Device ID pour score unique ====
  let deviceId = localStorage.getItem("deviceId");
  if(!deviceId){ deviceId = crypto.randomUUID(); localStorage.setItem("deviceId", deviceId); }

  let playerNickname = localStorage.getItem("playerNickname") || "player";

  // =================================================================
  // CONFIGURATION MANETTES — figée en dur, pas de PC/clavier, pas
  // d'outil de config externe. Manettes Switch (Joy-Con / Pro).
  //
  // Manette 1 (bleue) -> Joueur 1 (dude1) : axe 1, bouton 13
  // Manette 2 (rouge) -> Joueur 2 (dude2) : axe 3, bouton 1,
  //                       inversée à 180° (manette tenue à l'envers)
  //
  // L'assignation manette -> joueur se fait par ORDRE DE CONNEXION :
  // la première manette qui envoie un input devient pad1 (joueur 1),
  // la seconde devient pad2 (joueur 2). Cet ordre reste fixe une fois
  // assigné, il ne change plus en cours de partie.
  // =================================================================
  const DEADZONE = 0.2;

  const PLAYER_CONFIGS = {
    p1: { axis: 1,  jump: 13, invert: false },
    p2: { axis: 3,  jump: 1,  invert: true  }
  };

  var pad1 = null, pad2 = null;
  var statusText = null, debugText = null, dKey = null, debugOn = false;

  // ==== Variables globales ====
  var player1, player2, stars, bombs, platforms;
  var score = 0, scoreText;
  var lives = 3, lifeIcons = [];
  var gameOver = false;
  var currentLevel = 0;
  var platformsArray = [];

  // ==== Layout des niveaux ====
  var platformLayouts = [
    [{x:600,y:400},{x:50,y:250},{x:750,y:220}],
    [{x:150,y:350},{x:400,y:200},{x:650,y:300},{x:400,y:470}],
    [{x:700,y:250},{x:80,y:150},{x:500,y:400}],
    [{x:300,y:420},{x:40,y:200},{x:650,y:120},{x:400,y:300}],
    [{x:200,y:380},{x:40,y:140},{x:600,y:240},{x:350,y:100}],
    [{x:200,y:150},{x:500,y:310},{x:700,y:180},{x:350,y:460}],
    [{x:100,y:380},{x:300,y:250},{x:500,y:150},{x:700,y:250}],
    [{x:50,y:380},{x:250,y:200},{x:450,y:100},{x:650,y:200}],
    [{x:400,y:380},{x:200,y:250},{x:600,y:150}],
    [{x:100,y:500},{x:300,y:350},{x:500,y:200},{x:700,y:100}]
  ];

  // ==== Config Phaser ====
  var config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: { default: 'arcade', arcade: { gravity:{y:300}, debug:false } },
    input: { gamepad: true },
    scene: { preload, create, update }
  };
  new Phaser.Game(config);

  function preload(){
    this.load.image('sky','assets/sky.png');
    this.load.image('ground','assets/platform.png');
    this.load.image('star','assets/piece.png');
    this.load.image('bomb','assets/bombe.png');
    this.load.image('vie','assets/vie1.png');
    this.load.image('novie','assets/vie2.png');
    this.load.image('tremplin','assets/tremplin.png');

    this.load.spritesheet('dude1','assets/personnageframe1.png',{frameWidth:320, frameHeight:480});
    this.load.spritesheet('dude2','assets/personnageframe2.png',{frameWidth:320, frameHeight:480});
  }

  function create(){
    this.add.image(400,300,'sky');
    scoreText = this.add.text(16,16,'Score: 0',{fontSize:'32px',fill:'#000'});

    for(let i=0;i<lives;i++) lifeIcons.push(this.add.image(40+i*45,70,'vie').setScale(0.02));

    platforms = this.physics.add.staticGroup();
    platforms.create(400,568,'ground').setScale(2).refreshBody();
    createPlatformsForLevel(currentLevel);

    player1 = this.physics.add.sprite(100,450,'dude1').setScale(0.125).setBounce(0.2).setCollideWorldBounds(true);
    player2 = this.physics.add.sprite(700,450,'dude2').setScale(0.125).setBounce(0.2).setCollideWorldBounds(true);

    this.anims.create({key:'left1', frames:this.anims.generateFrameNumbers('dude1',{start:0,end:3}), frameRate:10, repeat:-1});
    this.anims.create({key:'turn1', frames:[{key:'dude1',frame:4}], frameRate:20});
    this.anims.create({key:'right1', frames:this.anims.generateFrameNumbers('dude1',{start:5,end:8}), frameRate:10, repeat:-1});

    this.anims.create({key:'left2', frames:this.anims.generateFrameNumbers('dude2',{start:0,end:3}), frameRate:10, repeat:-1});
    this.anims.create({key:'turn2', frames:[{key:'dude2',frame:4}], frameRate:20});
    this.anims.create({key:'right2', frames:this.anims.generateFrameNumbers('dude2',{start:5,end:8}), frameRate:10, repeat:-1});

    stars = this.physics.add.group({key:'star', repeat:11, setXY:{x:12,y:0,stepX:70}});
    stars.children.iterate(c => { c.setBounceY(Phaser.Math.FloatBetween(0.4,0.8)); c.setScale(0.015); });

    bombs = this.physics.add.group();

    this.physics.add.collider(player1, platforms);
    this.physics.add.collider(player2, platforms);
    this.physics.add.collider(stars, platforms);
    this.physics.add.collider(bombs, platforms);

    this.physics.add.overlap(player1, stars, collectStar, null, this);
    this.physics.add.overlap(player2, stars, collectStar, null, this);

    this.physics.add.collider(player1, bombs, hitBomb, null, this);
    this.physics.add.collider(player2, bombs, hitBomb, null, this);

    // --- Assignation des manettes (aucun clavier, pad uniquement) ---
    assignPads(this.input.gamepad.gamepads);

    this.input.gamepad.on('connected', (pad) => {
      console.log('[manette] connectée :', pad.index, pad.id);
      assignPads(this.input.gamepad.gamepads);
    });

    this.input.gamepad.on('disconnected', (pad) => {
      console.log('[manette] déconnectée :', pad.index, pad.id);
      if (pad1 === pad) pad1 = null;
      if (pad2 === pad) pad2 = null;
    });

    // --- Diagnostic ---
    // Ligne toujours visible : statut de connexion des 2 manettes.
    statusText = this.add.text(400, 590, '', { fontSize: '13px', fill: '#ffcc66' }).setOrigin(0.5, 1);

    // Overlay complet (axes/boutons en direct) : touche D pour afficher/masquer.
    debugText = this.add.text(16, 420, '', { fontSize: '13px', fill: '#00ff00', backgroundColor: '#000000aa' });
    debugText.setVisible(false);
    dKey = this.input.keyboard.addKey('D');
  }

  // -----------------------------------------------------------------
  // Assigne les manettes physiques à pad1/pad2 par ordre de connexion,
  // une seule fois. Ne réassigne jamais une manette déjà attribuée.
  // -----------------------------------------------------------------
  function assignPads(gamepadList){
    const pads = gamepadList.filter(p => p);
    pads.forEach(pad => {
      if (pad !== pad1 && pad !== pad2) {
        if (!pad1) { pad1 = pad; console.log('[manette] pad1 (Joueur 1, bleu) =', pad.id); }
        else if (!pad2) { pad2 = pad; console.log('[manette] pad2 (Joueur 2, rouge) =', pad.id); }
      }
    });
  }

  function update(){
    // Filet de sécurité : retente l'assignation à chaque frame au cas où
    // l'événement 'connected' aurait été raté (ex: manette déjà active
    // avant le chargement de la page).
    assignPads(this.input.gamepad.gamepads);

    updateDiagnostic.call(this);

    if(gameOver) return;

    movePlayer(player1, pad1, PLAYER_CONFIGS.p1, {left:'left1', turn:'turn1', right:'right1'});
    movePlayer(player2, pad2, PLAYER_CONFIGS.p2, {left:'left2', turn:'turn2', right:'right2'});
  }

  function updateDiagnostic(){
    // Ligne toujours visible
    const s1 = pad1 ? `#${pad1.index} OK (${pad1.axes.length} axes, ${pad1.buttons.length} boutons)` : 'NON connectée';
    const s2 = pad2 ? `#${pad2.index} OK (${pad2.axes.length} axes, ${pad2.buttons.length} boutons)` : 'NON connectée';
    statusText.setText(`Manette 1 (bleu): ${s1}   |   Manette 2 (rouge): ${s2}   [D = debug détaillé]`);

    if (Phaser.Input.Keyboard.JustDown(dKey)) {
      debugOn = !debugOn;
      debugText.setVisible(debugOn);
    }
    if (debugOn) {
      debugText.setText(buildDebugInfo());
    }
  }

  function buildDebugInfo(){
    const lines = [];
    [['P1', pad1, PLAYER_CONFIGS.p1], ['P2', pad2, PLAYER_CONFIGS.p2]].forEach(([label, pad, cfg]) => {
      if (!pad) { lines.push(`${label}: aucune manette assignée`); return; }
      const axesStr = pad.axes.map((a, i) => `ax${i}=${a.getValue().toFixed(2)}`).join(' ');
      const pressed = [];
      pad.buttons.forEach((b, i) => { if (b.pressed) pressed.push(i); });
      const axisOk = cfg.axis < pad.axes.length ? 'OK' : `HORS LIMITE (max ${pad.axes.length - 1})`;
      const jumpOk = cfg.jump < pad.buttons.length ? 'OK' : `HORS LIMITE (max ${pad.buttons.length - 1})`;
      lines.push(`${label} (${pad.id.slice(0,30)})`);
      lines.push(`  config: axe=${cfg.axis} [${axisOk}]  boutonSaut=${cfg.jump} [${jumpOk}]`);
      lines.push(`  axes live: ${axesStr}`);
      lines.push(`  boutons appuyés: [${pressed.join(',')}]`);
    });
    lines.push('(D pour cacher)');
    return lines.join('\n');
  }

  // -----------------------------------------------------------------
  // movePlayer(player, pad, cfg, anims)
  // N'utilise que pad.axes[] / pad.buttons[] (pas de pad.leftStick).
  // Tolère pad === null (manette absente/débranchée) sans planter.
  // -----------------------------------------------------------------
  function movePlayer(player, pad, cfg, anims){
    if(!pad || !pad.connected){
      player.setVelocityX(0);
      player.anims.play(anims.turn, true);
      return;
    }

    const axisObj = pad.axes && pad.axes[cfg.axis];
    let value = axisObj ? axisObj.getValue() : 0;
    if (cfg.invert) value = -value;

    if(value < -DEADZONE){
      player.setVelocityX(-160);
      player.anims.play(anims.left, true);
    }
    else if(value > DEADZONE){
      player.setVelocityX(160);
      player.anims.play(anims.right, true);
    }
    else {
      player.setVelocityX(0);
      player.anims.play(anims.turn, true);
    }

    const jumpBtn = pad.buttons && pad.buttons[cfg.jump];
    if(jumpBtn && jumpBtn.pressed && player.body.touching.down){
      player.setVelocityY(-330);
    }
  }

  function collectStar(player, star){
    star.disableBody(true,true);
    score += 10;
    scoreText.setText('Score: '+score);
    if(stars.countActive(true)===0){
      changeLevel();
      stars.children.iterate(c => c.enableBody(true,c.x,0,true,true));
      let x = (player.x<400)?Phaser.Math.Between(400,800):Phaser.Math.Between(0,400);
      let bomb = bombs.create(x,16,'bomb').setScale(0.015);
      bomb.body.setSize(bomb.width*0.015, bomb.height*0.015);
      bomb.body.setOffset(bomb.width*0.015, bomb.height*0.015);
      bomb.setBounce(1).setCollideWorldBounds(true).setVelocity(Phaser.Math.Between(-200,200),20);
    }
  }

  function hitBomb(player, bomb){
    bomb.disableBody(true,true);
    lives--;
    if(lives>=0) lifeIcons[lives].setTexture('novie').setScale(0.02);
    if(lives<=0 && !gameOver){
      gameOver=true;
      this.physics.pause();
      player1.setTint(0xff0000);
      player2.setTint(0xff0000);
      player1.anims.play('turn1');
      player2.anims.play('turn2');
      saveScore();
    }
  }

  function saveScore() {
    const ref = db.collection("scores").doc(deviceId);

    ref.get().then(doc => {
      if (!doc.exists) {
        ref.set({ pseudo: playerNickname, score: score, date: Date.now() });
        console.log("Nouveau score créé !");
        return;
      }

      const oldData = doc.data();

      if (score > oldData.score) {
        ref.set({ pseudo: playerNickname, score: score, date: Date.now() });
        console.log("Score mis à jour !");
      } else if (playerNickname !== oldData.pseudo) {
        ref.update({ pseudo: playerNickname });
        console.log("Pseudo mis à jour !");
      }
    }).catch(err => console.error("Erreur saveScore:", err));
  }

  function createPlatformsForLevel(level){
    platformsArray.forEach(p=>p.destroy());
    platformsArray=[];
    platformLayouts[level].forEach(pos=>platformsArray.push(platforms.create(pos.x,pos.y,'ground')));
  }

  function changeLevel(){
    currentLevel = (currentLevel+1)%platformLayouts.length;
    createPlatformsForLevel(currentLevel);
  }

</script>
</body>
</html>
