<!doctype html>

<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Solo</title>
  <link rel="icon" type="image/png" sizes="64x64" href="./favicon.png">

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>

  <style>
    body {
      margin: 0;
      background-color: #413d3d;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas { border: 4px solid #291515; }
  </style>

</head>
<body>

<div id="game-wrapper"></div>

<script>
var player1, player2, platforms;
var player1Pad = null, player2Pad = null;
var joinScreen = true, joinStage = 'p1assign';
var prevButtons = {};
var axisExcluded = {};

var JUMP_BUTTON = { player1: 12, player2: 2 };

var config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  physics: { default: 'arcade', arcade: { gravity:{y:300} } },
  input: { gamepad: true },
  scene: { preload, create, update }
};
new Phaser.Game(config);

function preload(){
  this.load.image('sky','assets/sky.png');
  this.load.image('ground','assets/platform.png');
  this.load.spritesheet('dude1','assets/personnageframe1.png',{frameWidth:320,frameHeight:480});
  this.load.spritesheet('dude2','assets/personnageframe2.png',{frameWidth:320,frameHeight:480});
}

function create(){
  this.add.image(400,300,'sky');

  platforms = this.physics.add.staticGroup();
  platforms.create(400,568,'ground').setScale(2).refreshBody();

  player1 = this.physics.add.sprite(100,450,'dude1').setScale(0.125).setCollideWorldBounds(true);
  player2 = this.physics.add.sprite(700,450,'dude2').setScale(0.125).setCollideWorldBounds(true);

  this.physics.add.collider(player1, platforms);
  this.physics.add.collider(player2, platforms);
}

function update(){
  const pads = this.input.gamepad.gamepads;

  if(joinScreen){
    handleJoinScreen(pads);
    return;
  }

  movePlayer(player1, pads[player1Pad], player1Pad, JUMP_BUTTON.player1);
  movePlayer(player2, pads[player2Pad], player2Pad, JUMP_BUTTON.player2);
}

function handleJoinScreen(pads){
  let handled = false;

  pads.forEach((pad,index)=>{
    if(!pad) return;

    pad.buttons.forEach((b,i)=>{
      const key = index+"_"+i;
      const was = prevButtons[key] || false;
      const just = b.pressed && !was;
      prevButtons[key] = b.pressed;

      if(!just || handled) return;

      if(joinStage==='p1assign'){
        player1Pad = index;
        joinStage='p2assign';
        handled=true;
      } else if(joinStage==='p2assign'){
        player2Pad = index;
        joinScreen=false;
        handled=true;
      }
    });
  });
}

function movePlayer(player, pad, padIndex, jumpButtonIndex){
  if(!pad) return;

  if(!axisExcluded[padIndex]){
    axisExcluded[padIndex] = pad.axes.map(a => Math.abs(a.value) > 0.5);
  }

  let moveX = 0;
  pad.axes.forEach((a,i)=>{
    if(axisExcluded[padIndex][i]) return;
    if(Math.abs(a.value) > 0.2) moveX = a.value;
  });

  if(moveX < 0){
    player.setVelocityX(-160);
  } else if(moveX > 0){
    player.setVelocityX(160);
  } else {
    player.setVelocityX(0);
  }

  // ✅ SAUT CORRIGÉ
  const jumpPressed = pad.buttons[jumpButtonIndex] && pad.buttons[jumpButtonIndex].pressed;

  if(jumpPressed && player.body.touching.down){
    player.setVelocityY(-330);
  }
}
</script>

</body>
</html>
