<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Choix des personnages</title>

  <!-- Phaser -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>

  <style>
    body {
      margin: 0;
      background-color: #413d3d;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas { border: 4px solid #291515; }
  </style>
</head>
<body>

<script>
  // ==== Personnages disponibles ====
  var CHAR_KEYS = ['perso1', 'perso2', 'perso3'];
  var BIG_CHAR_KEYS = ['persobig1', 'persobig2', 'persobig3'];

  // ==== Config manettes (identique au jeu, à ajuster pareil si besoin) ====
  var JUMP_BUTTONS = {
    player1: [19], // bouton SR pour valider / joueur 1
    player2: [21]  // bouton SR pour valider / joueur 2
  };

  var CONTROLS = {
    player1: { axisNav: 0, invertNav: true }, // axe utilisé pour naviguer haut/bas
    player2: { axisNav: 0, invertNav: true }
  };

  // Repli manuel si la détection auto (L/R) ne trouve pas la bonne manette.
  // Regarde le texte de debug en bas et mets le numéro de Pad ici si besoin.
  var MANUAL_PAD = { player1: null, player2: null };

  var player1Pad = null, player2Pad = null;
  var prevAxisDir = { player1: 0, player2: 0 };
  var prevJump = { player1: false, player2: false };
  var prevAnyButton = { player1: false, player2: false };

  // Position des miniatures (bord) et du grand portrait pour chaque côté.
  // Joueur 1 : miniatures collées au bord gauche, portrait vers le centre.
  // Joueur 2 : miroir, miniatures collées au bord droit.
  var LAYOUT = {
    player1: { thumbX: 70, bigX: 260, titleX: 200 },
    player2: { thumbX: 730, bigX: 540, titleX: 600 }
  };

  var config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#413d3d',
    input: { gamepad: true },
    scene: { preload, create, update }
  };
  new Phaser.Game(config);

  // phase: 'connect' -> 'select' -> (ready true/false géré à part)
  var state = {
    player1: { phase: 'connect', selection: 0, ready: false },
    player2: { phase: 'connect', selection: 0, ready: false }
  };

  var slotBoxes = { player1: [], player2: [] };
  var slotImages = { player1: [], player2: [] };
  var bigImages = { player1: null, player2: null };
  var readyTexts = { player1: null, player2: null };
  var connectTexts = { player1: null, player2: null };
  var startText, debugText, skyImage;

  function preload() {
    this.load.image('sky', 'assets/sky.png');
    this.load.image('perso1', 'assets/perso1.png');
    this.load.image('perso2', 'assets/perso2.png');
    this.load.image('perso3', 'assets/perso3.png');
    this.load.image('persobig1', 'assets/persobig1.png');
    this.load.image('persobig2', 'assets/persobig2.png');
    this.load.image('persobig3', 'assets/persobig3.png');
  }

  function create() {
    // Fond "sky", masqué tant que personne n'est connecté
    skyImage = this.add.image(400, 300, 'sky');
    skyImage.setDepth(-1);
    skyImage.setVisible(false);

    // Ligne centrale séparant les deux côtés
    const divider = this.add.graphics();
    divider.fillStyle(0x291515, 1);
    divider.fillRect(398, 0, 4, 600);

    this.add.text(LAYOUT.player1.titleX, 30, 'JOUEUR 1', { fontSize: '28px', fontStyle: 'bold', fill: '#fff' }).setOrigin(0.5);
    this.add.text(LAYOUT.player2.titleX, 30, 'JOUEUR 2', { fontSize: '28px', fontStyle: 'bold', fill: '#fff' }).setOrigin(0.5);

    buildSide.call(this, 'player1');
    buildSide.call(this, 'player2');

    startText = this.add.text(400, 560, '', { fontSize: '22px', fontStyle: 'bold', fill: '#ffd700', align: 'center' }).setOrigin(0.5);

    debugText = this.add.text(16, 500, '', { fontSize: '14px', fill: '#fff', backgroundColor: '#000', padding: { x: 8, y: 4 } });
    debugText.setDepth(1000);
  }

  function buildSide(playerKey) {
    const L = LAYOUT[playerKey];
    const size = 70;
    const gap = 20;
    const startY = 130;

    CHAR_KEYS.forEach((key, i) => {
      const y = startY + i * (size + gap);

      const box = this.add.graphics();
      slotBoxes[playerKey].push(box);

      const img = this.add.image(L.thumbX, y, key).setDisplaySize(45, 45);
      slotImages[playerKey].push(img);
    });

    bigImages[playerKey] = this.add.image(L.bigX, 330, BIG_CHAR_KEYS[0]).setDisplaySize(210, 320);

    readyTexts[playerKey] = this.add.text(L.thumbX, startY + 3 * (size + gap) + 10, '', {
      fontSize: '18px', fontStyle: 'bold', fill: '#7CFC00', align: 'center'
    }).setOrigin(0.5, 0);

    connectTexts[playerKey] = this.add.text(L.titleX, 300,
      (playerKey === 'player1' ? 'Joueur 1' : 'Joueur 2') + '\nappuie sur un bouton\npour te connecter',
      { fontSize: '22px', fontStyle: 'bold', fill: '#fff', align: 'center' }
    ).setOrigin(0.5);

    drawSide.call(this, playerKey);
  }

  function drawSide(playerKey) {
    const L = LAYOUT[playerKey];
    const size = 70;
    const gap = 20;
    const startY = 130;
    const s = state[playerKey];
    const visible = s.phase !== 'connect';

    CHAR_KEYS.forEach((key, i) => {
      const y = startY + i * (size + gap);
      const box = slotBoxes[playerKey][i];
      const isSelected = s.selection === i;

      slotImages[playerKey][i].setVisible(visible);

      box.clear();
      if (!visible) return;

      box.fillStyle(0xffffff, 1);
      box.fillRect(L.thumbX - size / 2, y - size / 2, size, size);

      if (isSelected) {
        box.lineStyle(5, s.ready ? 0x7CFC00 : 0xffd700, 1);
      } else {
        box.lineStyle(3, 0x000000, 1);
      }
      box.strokeRect(L.thumbX - size / 2, y - size / 2, size, size);
    });

    bigImages[playerKey].setVisible(visible);
    bigImages[playerKey].setTexture(BIG_CHAR_KEYS[s.selection]);

    readyTexts[playerKey].setText(visible && s.ready ? 'PRÊT ✓' : '');
    connectTexts[playerKey].setVisible(!visible);
  }

  function update() {
    try {
      const gp = this.input.gamepad;
      const allPads = gp ? gp.gamepads : [];

      let debug = 'p1=' + player1Pad + ' p2=' + player2Pad + '\n';
      allPads.forEach((pad, index) => {
        if (!pad) return;
        let axesStr = pad.axes.map((a, i) => i + ':' + a.value.toFixed(2)).join(' ');
        debug += 'Pad' + index + ' id="' + pad.id + '"\n  axes[' + axesStr + ']\n';
      });
      debugText.setText(debug);

      assignPads(allPads);

      const pad1 = allPads[player1Pad];
      const pad2 = allPads[player2Pad];

      handleSide.call(this, 'player1', pad1);
      handleSide.call(this, 'player2', pad2);

      if (state.player1.phase === 'select' && state.player1.ready &&
          state.player2.phase === 'select' && state.player2.ready) {
        startText.setText('Prêt à commencer !');
        goToGameIfConfirmed(allPads);
      } else {
        startText.setText('');
      }
    } catch (err) {
      debugText.setText('ERREUR: ' + err.message);
    }
  }

  function handleSide(playerKey, pad) {
    const s = state[playerKey];

    if (s.phase === 'connect') {
      if (!pad) {
        connectTexts[playerKey].setText(
          (playerKey === 'player1' ? 'Joueur 1' : 'Joueur 2') + '\nen attente de connexion...'
        );
        return;
      }
      connectTexts[playerKey].setText(
        (playerKey === 'player1' ? 'Joueur 1' : 'Joueur 2') + '\nappuie sur un bouton\npour te connecter'
      );
      const anyPressed = pad.buttons.some(b => b.pressed);
      const justPressed = anyPressed && !prevAnyButton[playerKey];
      prevAnyButton[playerKey] = anyPressed;
      if (justPressed) {
        s.phase = 'select';
        skyImage.setVisible(true);
        drawSide.call(this, playerKey);
      }
      return;
    }

    // phase === 'select'
    if (!pad) return;
    const control = CONTROLS[playerKey];

    if (!s.ready) {
      const deadzone = 0.5;
      let axisVal = pad.axes[control.axisNav] ? pad.axes[control.axisNav].value : 0;
      if (control.invertNav) axisVal = -axisVal;

      let dir = 0;
      if (axisVal < -deadzone) dir = -1;
      else if (axisVal > deadzone) dir = 1;

      // On ne réagit qu'au moment où le stick passe en position (évite de
      // défiler en continu tant que le stick reste poussé).
      if (dir !== 0 && prevAxisDir[playerKey] === 0) {
        s.selection = (s.selection + dir + CHAR_KEYS.length) % CHAR_KEYS.length;
        drawSide.call(this, playerKey);
      }
      prevAxisDir[playerKey] = dir;
    }

    const jumpPressed = JUMP_BUTTONS[playerKey].some(i => pad.buttons[i] && pad.buttons[i].pressed);
    if (jumpPressed && !prevJump[playerKey]) {
      s.ready = !s.ready; // appuyer confirme, ré-appuyer permet de changer d'avis
      drawSide.call(this, playerKey);
    }
    prevJump[playerKey] = jumpPressed;
  }

  function goToGameIfConfirmed(allPads) {
    // Une fois les deux joueurs prêts, n'importe quel appui supplémentaire
    // lance la partie (évite un démarrage accidentel dès que ready passe à true).
    const anyExtraPress = allPads.some(pad => pad && pad.buttons.some(b => b.pressed));
    if (!anyExtraPress) return;

    localStorage.setItem('player1Skin', CHAR_KEYS[state.player1.selection]);
    localStorage.setItem('player2Skin', CHAR_KEYS[state.player2.selection]);
    window.location.href = 'index.html';
  }

  // ==== Détection des manettes (identique au jeu) ====
  function assignPads(allPads) {
    if (MANUAL_PAD.player1 !== null) player1Pad = MANUAL_PAD.player1;
    if (MANUAL_PAD.player2 !== null) player2Pad = MANUAL_PAD.player2;
    if (MANUAL_PAD.player1 !== null && MANUAL_PAD.player2 !== null) return;

    let lIndex = null, rIndex = null;
    const others = [];

    allPads.forEach((pad, index) => {
      if (!pad) return;
      if (index === MANUAL_PAD.player1 || index === MANUAL_PAD.player2) return;
      const side = detectSide(pad);
      if (side === 'L' && lIndex === null) lIndex = index;
      else if (side === 'R' && rIndex === null) rIndex = index;
      else others.push(index);
    });

    if (MANUAL_PAD.player1 === null) {
      if (lIndex !== null) player1Pad = lIndex;
      else if (player1Pad === null && others.length) player1Pad = others.shift();
    }

    if (MANUAL_PAD.player2 === null) {
      if (rIndex !== null) player2Pad = rIndex;
      else if (player2Pad === null && others.length) player2Pad = others.shift();
    }
  }

  function detectSide(pad) {
    if (!pad || !pad.id) return null;
    const id = pad.id.toLowerCase();
    if (id.includes('(l)') || id.includes('joy-con l') || id.includes('left')) return 'L';
    if (id.includes('(r)') || id.includes('joy-con r') || id.includes('right')) return 'R';
    return null;
  }
</script>
</body>
</html>
