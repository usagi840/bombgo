<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solo</title>
  <link rel="icon" type="image/png" sizes="64x64" href="./favicon.png">

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    :root{
      --bg: #413d3d;
      --panel: #2b2828;
      --border: #291515;
      --accent: #e8b04b;
      --accent-dim: #a97f2f;
      --text: #f2ede3;
      --text-dim: #b8b0a4;
      --danger: #c0503f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background-color: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
    }

    #lobby {
      width: 800px;
      min-height: 600px;
      border: 4px solid var(--border);
      background: radial-gradient(circle at 50% 0%, #514a44 0%, var(--bg) 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 24px;
      text-align: center;
    }
    #lobby h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 6px;
      font-weight: 800;
      color: var(--accent);
      text-transform: uppercase;
    }
    .subtitle {
      margin: -12px 0 0 0;
      color: var(--text-dim);
      font-size: 14px;
      letter-spacing: 1px;
    }
    #lobby-body {
      display: flex;
      align-items: center;
      gap: 36px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #qrcode {
      background: #fff;
      padding: 10px;
      border-radius: 6px;
      line-height: 0;
      min-width: 176px;
      min-height: 176px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #qrcode .qr-fallback {
      color: #291515;
      font-size: 12px;
      max-width: 150px;
    }
    #room-code {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 10px;
      color: var(--text);
      background: var(--panel);
      border: 2px solid var(--accent-dim);
      border-radius: 8px;
      padding: 8px 18px;
      margin-top: 10px;
    }
    #room-code-label {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #qr-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #player-slots { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    .slot {
      width: 130px;
      height: 128px;
      border: 2px dashed #665f57;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: rgba(0,0,0,0.15);
    }
    .slot.filled {
      border-style: solid;
      border-color: var(--accent);
      background: rgba(232,176,75,0.12);
    }
    .slot .num { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
    .slot .name { font-size: 15px; font-weight: 600; }
    .slot.filled .name { color: var(--accent); }
    .slot .empty-icon { font-size: 20px; opacity: 0.4; }
    .slot .avatar {
      width: 48px;
      height: 48px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    #lobby-hint { font-size: 13px; color: var(--text-dim); max-width: 480px; }

    #error-box {
      display: none;
      border: 2px solid var(--danger);
      background: rgba(192,80,63,0.12);
      color: #ffb3a5;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 500px;
    }
  </style>
</head>
<body>

  <div id="lobby">
    <div>
      <h1>Solo</h1>
      <p class="subtitle">Scannez pour rejoindre la partie</p>
    </div>

    <div id="error-box"></div>

    <div id="lobby-body">
      <div id="qr-col">
        <div id="qrcode"></div>
        <div id="room-code-label">ou entrez le code</div>
        <div id="room-code">----</div>
      </div>
      <div id="player-slots"></div>
    </div>
    <p id="lobby-hint">Le premier joueur à rejoindre pourra lancer la partie depuis son téléphone. 1 à 4 joueurs.</p>
  </div>

<script>
  firebase.initializeApp({
    apiKey: "AIzaSyBV9NHc0geBSfb-AfAQXDmASJfNRGYga94",
    authDomain: "multi-74650.firebaseapp.com",
    projectId: "multi-74650",
    storageBucket: "multi-74650.firebasestorage.app",
    messagingSenderId: "906654613343",
    appId: "1:906654613343:web:b07d4a0f516d1b40acc0ea"
  });
  const db = firebase.firestore();
  const MAX_PLAYERS = 4;

  function showError(msg){
    const box = document.getElementById('error-box');
    box.textContent = msg;
    box.style.display = 'block';
  }

  function makeRoomId(len = 4){
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // sans O/0/I/1 ambigus
    let id = "";
    for(let i=0;i<len;i++) id += chars[Math.floor(Math.random()*chars.length)];
    return id;
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function renderSlots(players){
    const container = document.getElementById('player-slots');
    container.innerHTML = '';
    for(let i=1;i<=MAX_PLAYERS;i++){
      const p = players.find(pl => pl.slot === i);
      const div = document.createElement('div');
      div.className = 'slot' + (p ? ' filled' : '');
      if(p){
        div.innerHTML = `<div class="num">JOUEUR ${i}${i===1?' · HÔTE':''}</div>
          <img class="avatar" src="assets/perso${i}.png" alt="" onerror="this.style.display='none'">
          <div class="name">${escapeHtml(p.nickname || ('Joueur '+i))}</div>`;
      } else {
        div.innerHTML = `<div class="num">JOUEUR ${i}</div><div class="empty-icon">＋</div>`;
      }
      container.appendChild(div);
    }
  }

  async function createRoom(){
    let roomId, roomRef;

    try {
      roomId = makeRoomId();
      roomRef = db.collection("rooms").doc(roomId);
      await roomRef.set({
        createdAt: Date.now(),
        started: false,
        playerCount: 0,
        maxPlayers: MAX_PLAYERS
      });
    } catch(err){
      showError("Impossible de créer la salle (Firestore). Vérifie ta connexion et les règles Firestore. Détail : " + err.message);
      return;
    }

    // Le code de salle doit toujours s'afficher, même si le QR échoue ensuite
    document.getElementById('room-code').textContent = roomId;

    try {
      const controllerUrl = new URL('controller.html', window.location.href);
      controllerUrl.searchParams.set('room', roomId);

      if(typeof QRCode === 'undefined'){
        throw new Error('bibliothèque QR non chargée');
      }
      document.getElementById('qrcode').innerHTML = '';
      new QRCode(document.getElementById('qrcode'), {
        text: controllerUrl.toString(),
        width: 176,
        height: 176,
        colorDark: "#291515",
        colorLight: "#ffffff"
      });
    } catch(err){
      document.getElementById('qrcode').innerHTML =
        `<div class="qr-fallback">QR indisponible — utilisez le code ${roomId} sur l'écran de la manette.</div>`;
    }

    renderSlots([]);

    let launched = false;

    roomRef.collection('players').orderBy('slot').onSnapshot(snap => {
      renderSlots(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    }, err => showError("Erreur de synchronisation des joueurs : " + err.message));

    roomRef.onSnapshot(doc => {
      const data = doc.data();
      if(data && data.started && !launched){
        launched = true;
        window.location.href = 'game.html?room=' + roomId;
      }
    }, err => showError("Erreur de synchronisation de la salle : " + err.message));
  }

  createRoom();
</script>
</body>
</html>
