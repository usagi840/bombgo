<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bombgo — 1v1</title>
  <link rel="icon" type="image/png" sizes="64x64" href="./favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #413d3d;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }
    canvas { display: block; }

    /* ── Lobby / overlay ─────────────────────────────────────── */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(20,10,10,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px;
      z-index: 9998;
      color: #e8c8a0;
    }
    #overlay h1 { font-size: 2.8rem; letter-spacing: 3px; color: #f5a623; text-shadow: 0 2px 12px #0006; }
    #overlay p  { font-size: 1.1rem; opacity: .8; text-align: center; }
    #overlay input {
      padding: 10px 18px; font-size: 1rem;
      border: 2px solid #8b5c5c; border-radius: 8px;
      background: #2a1515; color: #e8c8a0;
      outline: none; width: 240px; text-align: center;
    }
    #overlay button {
      padding: 12px 36px; font-size: 1.05rem; font-weight: 700;
      border: 2px solid #f5a623; border-radius: 8px;
      background: #7a3b1e; color: #f5e6c8;
      cursor: pointer; letter-spacing: 1px;
      transition: background .2s, transform .1s;
    }
    #overlay button:hover  { background: #a0521f; transform: scale(1.04); }
    #overlay button:active { transform: scale(0.96); }
    #overlay .chars {
      display: flex; gap: 16px;
    }
    #overlay .char-btn {
      width: 60px; height: 60px;
      border: 3px solid #5a3a3a;
      border-radius: 10px;
      background: #2a1515;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      transition: border-color .2s, transform .1s;
    }
    #overlay .char-btn.selected { border-color: #f5a623; transform: scale(1.12); }

    #status-bar {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(20,10,10,0.82);
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 20px;
      font-size: 1rem; color: #e8c8a0;
      z-index: 9000;
      pointer-events: none;
    }
    .player-hud { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .player-hud .name { font-weight: 700; font-size: .95rem; }
    .player-hud .score-val { font-size: 1.3rem; color: #f5a623; font-weight: 700; }
    .player-hud .lives { display: flex; gap: 4px; font-size: 1.1rem; }

    #room-label {
      font-size: .8rem; opacity: .5; text-align: center;
    }

    #btn-fullscreen {
      position: fixed; top: 14px; right: 14px;
      width: 44px; height: 44px;
      background: rgba(41,21,21,0.85); border: 2px solid #8b5c5c;
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .1s; z-index: 9999;
    }
    #btn-fullscreen:hover  { background: rgba(80,40,40,0.95); transform: scale(1.08); }
    #btn-fullscreen:active { transform: scale(0.96); }
    #btn-fullscreen svg { width: 22px; height: 22px; fill: none; stroke: #e8c8a0; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Contrôles mobiles ───────────────────────────────────── */
    #mobile-controls {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      height: 160px; pointer-events: none; z-index: 9999;
    }
    #joystick-base {
      position: absolute; left: 30px; bottom: 30px;
      width: 160px; height: 70px; border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 2.5px solid rgba(255,255,255,0.3);
      pointer-events: all; touch-action: none;
    }
    #joystick-knob {
      position: absolute; width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.55);
      border: 2px solid rgba(255,255,255,0.9);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
    }
    #jump-zone {
      position: absolute; right: 0; top: 0; width: 50%; height: 100%;
      pointer-events: all; touch-action: none;
    }
    @media (pointer: coarse) { #mobile-controls { display: block; } }
  </style>
</head>
<body>

<!-- ── Overlay lobby ───────────────────────────────────────────────── -->
<div id="overlay">
  <h1>💣 BOMBGO</h1>
  <p id="overlay-msg">Choisis ton pseudo et ton personnage</p>

  <input id="input-nick" type="text" maxlength="14" placeholder="Ton pseudo" value="">

  <div class="chars">
    <div class="char-btn selected" data-char="1">🧑</div>
    <div class="char-btn"         data-char="2">👩</div>
    <div class="char-btn"         data-char="3">🧙</div>
  </div>

  <button id="btn-play">Trouver une partie</button>
</div>

<!-- ── HUD en jeu ──────────────────────────────────────────────────── -->
<div id="status-bar" style="display:none;">
  <div class="player-hud" id="hud-p0">
    <div class="name"  id="name-p0">—</div>
    <div class="score-val" id="score-p0">0</div>
    <div class="lives" id="lives-p0">❤️❤️❤️</div>
  </div>
  <div id="room-label">Salle —</div>
  <div class="player-hud" id="hud-p1">
    <div class="name"  id="name-p1">—</div>
    <div class="score-val" id="score-p1">0</div>
    <div class="lives" id="lives-p1">❤️❤️❤️</div>
  </div>
</div>

<!-- ── Plein écran ─────────────────────────────────────────────────── -->
<button id="btn-fullscreen" title="Plein écran" onclick="toggleFullscreen()">
  <svg id="icon-expand"   viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
  <svg id="icon-compress" viewBox="0 0 24 24" style="display:none;"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>
</button>

<div id="mobile-controls">
  <div id="joystick-base"><div id="joystick-knob"></div></div>
  <div id="jump-zone"></div>
</div>

<div id="game-wrapper"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  BOMBGO MULTIJOUEUR 1v1  — client
// ═══════════════════════════════════════════════════════════════════

// ── Plein écran ──────────────────────────────────────────────────
function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
document.addEventListener('fullscreenchange',()=>{
  const isFS = !!document.fullscreenElement;
  document.getElementById('icon-expand').style.display   = isFS?'none':'block';
  document.getElementById('icon-compress').style.display = isFS?'block':'none';
});

// ── Sélection personnage (lobby) ─────────────────────────────────
let selectedChar = localStorage.getItem('selectedCharacter') || '1';
document.querySelectorAll('.char-btn').forEach(btn=>{
  if(btn.dataset.char===selectedChar) btn.classList.add('selected');
  else btn.classList.remove('selected');
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.char-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedChar = btn.dataset.char;
    localStorage.setItem('selectedCharacter', selectedChar);
  });
});

// ── Contrôles mobiles ────────────────────────────────────────────
var mobileKeys = { left:false, right:false, up:false };

document.addEventListener('touchstart', e=>{
  for(var t of e.changedTouches){ if(t.clientX>window.innerWidth/2) mobileKeys.up=true; }
},{passive:true});
document.addEventListener('touchend', e=>{
  var stillRight=false;
  for(var t of e.touches){ if(t.clientX>window.innerWidth/2) stillRight=true; }
  if(!stillRight) mobileKeys.up=false;
},{passive:true});

document.addEventListener('DOMContentLoaded',()=>{
  var base=document.getElementById('joystick-base');
  var knob=document.getElementById('joystick-knob');
  var MAXDX=48, active=false, activeTouchId=null;
  base.addEventListener('touchstart',e=>{ e.preventDefault(); if(active)return; active=true; activeTouchId=e.changedTouches[0].identifier; moveTo(e.changedTouches[0]); },{passive:false});
  document.addEventListener('touchmove',e=>{ if(!active)return; for(var t of e.changedTouches){ if(t.identifier===activeTouchId){e.preventDefault();moveTo(t);break;} } },{passive:false});
  document.addEventListener('touchend',e=>{ for(var t of e.changedTouches){ if(t.identifier===activeTouchId){active=false;activeTouchId=null;reset();break;} } });
  document.addEventListener('touchcancel',e=>{ for(var t of e.changedTouches){ if(t.identifier===activeTouchId){active=false;activeTouchId=null;reset();break;} } });
  function moveTo(touch){
    var rect=base.getBoundingClientRect(), cx=rect.left+rect.width/2, dx=touch.clientX-cx;
    if(dx>MAXDX) dx=MAXDX; if(dx<-MAXDX) dx=-MAXDX;
    knob.style.transform='translate(calc(-50% + '+dx+'px), -50%)';
    mobileKeys.left  = dx/MAXDX < -0.25;
    mobileKeys.right = dx/MAXDX >  0.25;
  }
  function reset(){ knob.style.transform='translate(-50%,-50%)'; mobileKeys.left=false; mobileKeys.right=false; }
});

// ── Redimensionnement canvas ─────────────────────────────────────
function resizeCanvas(){
  var canvas=document.querySelector('canvas');
  if(!canvas) return;
  var scale=Math.min(window.innerWidth/800, window.innerHeight/600);
  canvas.style.width =(800*scale)+'px';
  canvas.style.height=(600*scale)+'px';
}
setTimeout(resizeCanvas,300);
window.addEventListener('resize',resizeCanvas);

// ─────────────────────────────────────────────────────────────────
//  ÉTAT GLOBAL
// ─────────────────────────────────────────────────────────────────
var socket = null;
var mySlot = 0;           // 0 ou 1
var myId   = null;
var roomId = null;
var playerNickname = localStorage.getItem('playerNickname') || '';

var gameStarted = false;
var gameOverFlag = false;

// Données locales des deux joueurs
var players = {
  0: { sprite:null, score:0, lives:3, dead:false, name:'P1', char:'1' },
  1: { sprite:null, score:0, lives:3, dead:false, name:'P2', char:'1' },
};

// Plateformes, étoiles, bombes (gérées côté client)
var platformLayouts = [
  [{x:600,y:400},{x:50,y:250},{x:750,y:220}],
  [{x:150,y:350},{x:400,y:200},{x:650,y:300},{x:400,y:470}],
  [{x:700,y:250},{x:80,y:150},{x:500,y:400}],
  [{x:300,y:420},{x:40,y:200},{x:650,y:120},{x:400,y:300}],
  [{x:200,y:380},{x:40,y:140},{x:600,y:240},{x:350,y:100}],
  [{x:200,y:150},{x:500,y:310},{x:700,y:180},{x:350,y:460}],
  [{x:100,y:380},{x:300,y:250},{x:500,y:150},{x:700,y:250}],
  [{x:50,y:380},{x:250,y:200},{x:450,y:100},{x:650,y:200}],
  [{x:400,y:380},{x:200,y:250},{x:600,y:150}],
  [{x:100,y:500},{x:300,y:350},{x:500,y:200},{x:700,y:100}]
];

var phaserScene   = null;   // référence à la scène Phaser active
var platforms     = null;
var platformsArr  = [];
var starsGroup    = null;
var starObjects   = {};     // starId → sprite
var bombsGroup    = null;
var bombObjects   = {};     // bombId → sprite
var cursors       = null;
var currentLevel  = 0;

// ─────────────────────────────────────────────────────────────────
//  LOBBY
// ─────────────────────────────────────────────────────────────────
var nickInput = document.getElementById('input-nick');
nickInput.value = playerNickname;

document.getElementById('btn-play').addEventListener('click', ()=>{
  var nick = nickInput.value.trim() || 'Player';
  playerNickname = nick;
  localStorage.setItem('playerNickname', nick);
  localStorage.setItem('selectedCharacter', selectedChar);

  document.getElementById('overlay-msg').textContent = '🔍 Recherche d\'adversaire…';
  document.getElementById('btn-play').disabled = true;
  document.getElementById('input-nick').disabled = true;
  document.querySelectorAll('.char-btn').forEach(b=>b.style.pointerEvents='none');

  connectSocket();
});

function connectSocket(){
  socket = io();
  myId   = socket.id; // sera éventuellement mis à jour

  socket.on('connect', ()=>{
    myId = socket.id;
    socket.emit('join', { nickname: playerNickname, character: selectedChar });
  });

  socket.on('waiting', data=>{
    roomId = data.roomId;
    document.getElementById('overlay-msg').textContent = '⏳ En attente d\'un adversaire… (Salle '+roomId+')';
  });

  socket.on('joined', data=>{
    mySlot = data.slot;
    applyServerState(data);
  });

  socket.on('start', data=>{
    applyServerState(data);
    hideLobby();
    // Démarre ou réinitialise le jeu
    if(phaserGame){
      restartGame();
    } else {
      startPhaser();
    }
  });

  socket.on('peerMove', data=>{
    // Mise à jour de la position de l'adversaire
    var peerSlot = (mySlot === 0) ? 1 : 0;
    var pd = players[peerSlot];
    if(pd.sprite){
      pd.sprite.setPosition(data.x, data.y);
      pd.sprite.setVelocity(data.vx, data.vy);
      if(data.anim) pd.sprite.anims.play(peerSlot+'_'+data.anim, true);
    }
  });

  socket.on('starCollected', data=>{
    // Retire l'étoile localement
    var sp = starObjects[data.starId];
    if(sp && sp.active) sp.disableBody(true,true);
    // Met à jour le score
    var slot = data.byId === socket.id ? mySlot : (mySlot===0?1:0);
    players[slot].score = data.score;
    updateHUD();
  });

  socket.on('newLevel', data=>{
    if(!phaserScene) return;
    currentLevel = data.level;
    buildPlatforms(data.layout);
    resetStars(data.stars);
    spawnBomb(data.bomb);
  });

  socket.on('playerHit', data=>{
    var slot = data.id === socket.id ? mySlot : (mySlot===0?1:0);
    players[slot].lives = data.lives;
    players[slot].dead  = data.dead;
    updateHUD();

    // Retire la bombe localement
    var bsp = bombObjects[data.bombId];
    if(bsp) bsp.disableBody(true,true);

    if(data.dead && data.id===socket.id && phaserScene){
      // Notre joueur est mort
      players[mySlot].sprite.setTint(0xff0000);
      players[mySlot].sprite.anims.play(mySlot+'_turn');
      phaserScene.physics.pause();
      gameOverFlag = true;
    }

    if(data.winner !== null){
      var winSlot = data.winner===socket.id ? mySlot : (mySlot===0?1:0);
      showGameOver(winSlot);
    }
  });

  socket.on('peerLeft', ()=>{
    showMessage('Adversaire déconnecté 😔', true);
  });

  socket.on('restart', data=>{
    applyServerState(data);
    gameOverFlag = false;
    if(phaserGame) restartGame();
  });

  socket.on('disconnect', ()=>{
    showMessage('Connexion perdue…', true);
  });
}

function applyServerState(data){
  roomId   = data.roomId;
  mySlot   = data.slot !== undefined ? data.slot : mySlot;
  currentLevel = data.gameState ? data.gameState.level : 0;

  if(data.players){
    data.players.forEach(p=>{
      var slot = p.slot;
      players[slot].score = p.score;
      players[slot].lives = p.lives;
      players[slot].dead  = p.dead;
      players[slot].name  = p.nickname;
      players[slot].char  = p.character;
    });
  }
  document.getElementById('room-label').textContent = 'Salle '+roomId;
  updateHUD();
}

// ─────────────────────────────────────────────────────────────────
//  HUD
// ─────────────────────────────────────────────────────────────────
function heartsStr(lives){ return '❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,3-lives)); }

function updateHUD(){
  for(var s=0;s<2;s++){
    var p = players[s];
    document.getElementById('name-p'+s).textContent  = p.name + (s===mySlot?' (moi)':'');
    document.getElementById('score-p'+s).textContent = p.score;
    document.getElementById('lives-p'+s).textContent = heartsStr(p.lives);
  }
}

function hideLobby(){
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('status-bar').style.display = 'flex';
}

function showMessage(msg, withReplay){
  var ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  document.getElementById('overlay-msg').textContent = msg;
  document.getElementById('btn-play').style.display  = withReplay ? 'block' : 'none';
  document.getElementById('btn-play').textContent    = 'Rejouer';
  document.getElementById('btn-play').disabled       = false;
  document.getElementById('input-nick').style.display= 'none';
  if(withReplay){
    document.getElementById('btn-play').onclick = ()=>{
      ov.style.display='none';
      document.getElementById('status-bar').style.display='flex';
      socket.emit('requestRestart');
    };
  }
}

function showGameOver(winSlot){
  var msg = winSlot===mySlot ? '🏆 Tu as gagné !' : '💀 Tu as perdu !';
  msg += '\n'+players[0].name+' : '+players[0].score+' pts  vs  '+players[1].name+' : '+players[1].score+' pts';
  showMessage(msg, true);
}

// ─────────────────────────────────────────────────────────────────
//  PHASER
// ─────────────────────────────────────────────────────────────────
var phaserGame = null;

function startPhaser(){
  var config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: { default:'arcade', arcade:{ gravity:{y:300}, debug:false } },
    scene: { preload: pPreload, create: pCreate, update: pUpdate },
    parent: 'game-wrapper',
  };
  phaserGame = new Phaser.Game(config);
  setTimeout(resizeCanvas, 300);
}

function pPreload(){
  this.load.image('sky',    'assets/sky.png');
  this.load.image('ground', 'assets/platform.png');
  this.load.image('star',   'assets/piece.png');
  this.load.image('bomb',   'assets/bombe.png');

  // Charge les spritesheet des deux joueurs
  for(var s=0;s<2;s++){
    var ch = players[s].char || '1';
    this.load.spritesheet('dude'+s, 'assets/personnageframe'+ch+'.png', {frameWidth:320,frameHeight:480});
  }
}

function pCreate(){
  phaserScene = this;
  this.add.image(400,300,'sky');

  // Plateformes
  platforms = this.physics.add.staticGroup();
  platforms.create(400,568,'ground').setScale(2).refreshBody();
  buildPlatforms(platformLayouts[currentLevel]);

  // Sprites joueurs
  for(var s=0;s<2;s++){
    var sp = this.physics.add.sprite(s===0?100:700, 450, 'dude'+s)
               .setScale(0.125).setBounce(0.2).setCollideWorldBounds(true);

    this.anims.create({key:s+'_left',  frames:this.anims.generateFrameNumbers('dude'+s,{start:0,end:3}), frameRate:10, repeat:-1});
    this.anims.create({key:s+'_turn',  frames:[{key:'dude'+s,frame:4}], frameRate:20});
    this.anims.create({key:s+'_right', frames:this.anims.generateFrameNumbers('dude'+s,{start:5,end:8}), frameRate:10, repeat:-1});

    // Teinte légère pour distinguer P1/P2
    if(s!==mySlot) sp.setTint(0xaaddff);

    players[s].sprite = sp;
    this.physics.add.collider(sp, platforms);
  }

  // Curseurs
  cursors = this.input.keyboard.createCursorKeys();

  // Étoiles
  starsGroup = this.physics.add.group();
  buildStarSprites(this);

  // Bombes
  bombsGroup = this.physics.add.group();

  // Collisions étoiles
  this.physics.add.overlap(players[mySlot].sprite, starsGroup, (player, star)=>{
    var starId = star.getData('starId');
    star.disableBody(true,true);
    socket.emit('collectStar', { starId });
  }, null, this);

  // Collision bombes (seulement mon sprite)
  this.physics.add.collider(players[mySlot].sprite, bombsGroup, (player, bomb)=>{
    var bombId = bomb.getData('bombId');
    socket.emit('hitBomb', { bombId });
  }, null, this);

  this.physics.add.collider(starsGroup, platforms);
  this.physics.add.collider(bombsGroup, platforms);
}

function pUpdate(){
  if(gameOverFlag || !players[mySlot].sprite) return;

  var sp = players[mySlot].sprite;
  var goLeft  = cursors.left.isDown  || mobileKeys.left;
  var goRight = cursors.right.isDown || mobileKeys.right;
  var goUp    = cursors.up.isDown    || mobileKeys.up;

  var anim = 'turn';
  if(goLeft)      { sp.setVelocityX(-160); anim='left'; }
  else if(goRight){ sp.setVelocityX(160);  anim='right'; }
  else            { sp.setVelocityX(0); }

  if(goUp && sp.body.touching.down) sp.setVelocityY(-330);

  sp.anims.play(mySlot+'_'+anim, true);

  // Envoie la position au serveur ~30x/s
  if(!socket || !socket.connected) return;
  socket.emit('move',{ x:sp.x, y:sp.y, vx:sp.body.velocity.x, vy:sp.body.velocity.y, anim });
}

// ─────────────────────────────────────────────────────────────────
//  Helpers Phaser
// ─────────────────────────────────────────────────────────────────
function buildPlatforms(layout){
  if(!phaserScene) return;
  platformsArr.forEach(p=>p.destroy());
  platformsArr=[];
  layout.forEach(pos=>platformsArr.push(platforms.create(pos.x,pos.y,'ground')));
}

function buildStarSprites(scene){
  starObjects={};
  for(var i=0;i<12;i++){
    var sp = scene.physics.add.sprite(12+i*70, 0, 'star').setScale(0.015);
    sp.setBounceY(Phaser.Math.FloatBetween(0.4,0.8));
    sp.setData('starId', i);
    starsGroup.add(sp);
    starObjects[i] = sp;
  }
}

function resetStars(starData){
  if(!phaserScene) return;
  // Détruit les anciens sprites
  starsGroup.clear(true,true);
  starObjects={};
  starData.forEach(s=>{
    var sp = phaserScene.physics.add.sprite(s.x, 0, 'star').setScale(0.015);
    sp.setBounceY(Phaser.Math.FloatBetween(0.4,0.8));
    sp.setData('starId', s.id);
    starsGroup.add(sp);
    starObjects[s.id] = sp;
    phaserScene.physics.add.collider(sp, platforms);
  });
  // Relie la collecte
  phaserScene.physics.add.overlap(players[mySlot].sprite, starsGroup, (player, star)=>{
    var starId = star.getData('starId');
    star.disableBody(true,true);
    socket.emit('collectStar',{starId});
  }, null, phaserScene);
}

function spawnBomb(b){
  if(!phaserScene) return;
  var sp = phaserScene.physics.add.sprite(b.x, b.y, 'bomb').setScale(0.015);
  sp.setBounce(1).setCollideWorldBounds(true).setVelocity(b.vx, b.vy);
  sp.setData('bombId', b.id);
  bombsGroup.add(sp);
  bombObjects[b.id]=sp;
  phaserScene.physics.add.collider(sp, platforms);
  phaserScene.physics.add.collider(players[mySlot].sprite, sp, ()=>{
    socket.emit('hitBomb',{bombId:b.id});
  }, null, phaserScene);
}

function restartGame(){
  // Réinitialise la scène Phaser
  if(phaserGame){
    phaserScene = null;
    gameOverFlag = false;
    starObjects={};
    bombObjects={};
    phaserGame.scene.restart('default');
  }
}
</script>
