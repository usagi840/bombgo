<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Résultat</title>
  <style>
    body {
      margin: 0;
      background-color: #413d3d;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
    }
    #canvas-wrapper {
      border: 4px solid #291515;
      width: 800px;
      height: 600px;
      display: flex;
      flex-direction: column;
    }
    #halves {
      display: flex;
      flex: 1;
    }
    .half {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: background-color 0.3s;
    }
    .half.win { background-color: #2e8b2e; }
    .half.lose { background-color: #b23a3a; }
    .half.draw { background-color: #8a8a2e; }

    .player-label {
      font-size: 32px;
      color: #fff;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
      margin-bottom: 12px;
    }
    .player-score {
      font-size: 48px;
      color: #fff;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
    }
    .status {
      font-size: 20px;
      color: #fff;
      margin-top: 10px;
      opacity: 0.9;
    }
    #bottom-bar {
      height: 70px;
      background-color: #291515;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
    }
    #bottom-bar button {
      font-size: 18px;
      padding: 10px 24px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background-color: #f2d16b;
      font-weight: bold;
    }
    #bottom-bar button:hover {
      background-color: #e0bd50;
    }
  </style>
</head>
<body>

  <div id="canvas-wrapper">
    <div id="halves">
      <div class="half" id="half1">
        <div class="player-label">Joueur 1</div>
        <div class="player-score" id="score1">0</div>
        <div class="status" id="status1"></div>
      </div>
      <div class="half" id="half2">
        <div class="player-label">Joueur 2</div>
        <div class="player-score" id="score2">0</div>
        <div class="status" id="status2"></div>
      </div>
    </div>
    <div id="bottom-bar">
      <button onclick="window.location.href='solo.html'">Rejouer</button>
    </div>
  </div>

<script>
  // Lecture des scores (et pseudos, si transmis) passés dans l'URL par
  // solo.html (ex: result.html?score1=120&score2=90&name1=Alice&name2=Bob)
  const params = new URLSearchParams(window.location.search);
  const score1 = parseInt(params.get('score1'), 10) || 0;
  const score2 = parseInt(params.get('score2'), 10) || 0;
  const name1 = params.get('name1') || 'Joueur 1';
  const name2 = params.get('name2') || 'Joueur 2';

  document.querySelector('#half1 .player-label').textContent = name1;
  document.querySelector('#half2 .player-label').textContent = name2;
  document.getElementById('score1').textContent = score1;
  document.getElementById('score2').textContent = score2;

  const half1 = document.getElementById('half1');
  const half2 = document.getElementById('half2');
  const status1 = document.getElementById('status1');
  const status2 = document.getElementById('status2');

  if(score1 === score2){
    half1.classList.add('draw');
    half2.classList.add('draw');
    status1.textContent = 'Égalité';
    status2.textContent = 'Égalité';
  } else if(score1 > score2){
    half1.classList.add('win');
    half2.classList.add('lose');
    status1.textContent = 'Gagnant';
    status2.textContent = 'Perdu';
  } else {
    half1.classList.add('lose');
    half2.classList.add('win');
    status1.textContent = 'Perdu';
    status2.textContent = 'Gagnant';
  }
</script>
</body>
</html>
