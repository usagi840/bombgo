<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Résultat</title>
  <style>
    body {
      margin: 0;
      background-color: #413d3d;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
    }
    #canvas-wrapper {
      border: 4px solid #291515;
      width: 800px;
      height: 600px;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    #halves {
      display: flex;
      flex: 1;
    }
    .half {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: background-color 0.3s;
      position: relative;
      overflow: hidden;
    }
    .half.win { background-color: #2e8b2e; }
    .half.lose { background-color: #b23a3a; }
    .half.draw { background-color: #8a8a2e; }

    .char-img {
      max-height: 280px;
      max-width: 85%;
      object-fit: contain;
      filter: drop-shadow(3px 4px 3px rgba(0,0,0,0.35));
    }

    .player-label {
      font-size: 28px;
      color: #fff;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
      margin-top: 6px;
    }
    .player-score {
      font-size: 42px;
      color: #fff;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
    }
    .status {
      font-size: 18px;
      color: #fff;
      margin-bottom: 14px;
      opacity: 0.9;
    }
    #controller-hint {
      position: absolute;
      bottom: 16px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 16px;
      color: #f2d16b;
      font-weight: bold;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>

  <div id="canvas-wrapper">
    <div id="halves">
      <div class="half" id="half1">
        <img class="char-img" id="charImg1" src="" alt="">
        <div class="player-label" id="label1">Joueur 1</div>
        <div class="player-score" id="score1">0</div>
        <div class="status" id="status1"></div>
      </div>
      <div class="half" id="half2">
        <img class="char-img" id="charImg2" src="" alt="">
        <div class="player-label" id="label2">Joueur 2</div>
        <div class="player-score" id="score2">0</div>
        <div class="status" id="status2"></div>
      </div>
    </div>
    <div id="controller-hint">SR pour rejouer...</div>
  </div>

<script>
  // Lecture des scores, pseudos et skins passés dans l'URL par game.html
  // (ex: result.html?score1=120&score2=90&name1=Alice&name2=Bob&skin1=3&skin2=1)
  const params = new URLSearchParams(window.location.search);
  const score1 = parseInt(params.get('score1'), 10) || 0;
  const score2 = parseInt(params.get('score2'), 10) || 0;
  const name1 = params.get('name1') || 'Joueur 1';
  const name2 = params.get('name2') || 'Joueur 2';
  const skin1 = [1,2,3,4].includes(parseInt(params.get('skin1'), 10)) ? parseInt(params.get('skin1'), 10) : 1;
  const skin2 = [1,2,3,4].includes(parseInt(params.get('skin2'), 10)) ? parseInt(params.get('skin2'), 10) : 2;

  document.getElementById('label1').textContent = name1;
  document.getElementById('label2').textContent = name2;
  document.getElementById('score1').textContent = score1;
  document.getElementById('score2').textContent = score2;
  // "persobig" : version grand format du même personnage que celui utilisé
  // en jeu (même numéro que assets/personnageN.png).
  document.getElementById('charImg1').src = 'assets/persobig' + skin1 + '.png';
  document.getElementById('charImg2').src = 'assets/persobig' + skin2 + '.png';

  const half1 = document.getElementById('half1');
  const half2 = document.getElementById('half2');
  const status1 = document.getElementById('status1');
  const status2 = document.getElementById('status2');

  if(score1 === score2){
    half1.classList.add('draw');
    half2.classList.add('draw');
    status1.textContent = 'Égalité';
    status2.textContent = 'Égalité';
  } else if(score1 > score2){
    half1.classList.add('win');
    half2.classList.add('lose');
    status1.textContent = 'Gagnant';
    status2.textContent = 'Perdu';
  } else {
    half1.classList.add('lose');
    half2.classList.add('win');
    status1.textContent = 'Perdu';
    status2.textContent = 'Gagnant';
  }

  // ==== Rejouer ====
  // Le bouton souris relance simplement game.html. Comme la configuration
  // manette + skins + pseudos est toujours dans localStorage
  // ("joyconGameConfig", écrite par menu.html), game.html la retrouvera
  // telle quelle et sautera directement l'écran de connexion : pas besoin
  // de rappuyer sur SR pour se reconnecter.
  function replay(){
    window.location.href = 'game.html';
  }

  // ==== Rejouer à la manette (bouton 19/21, ou le bouton de saut
  // configuré pour chaque joueur) ====
  let savedConfig = null;
  try {
    savedConfig = JSON.parse(localStorage.getItem('joyconGameConfig'));
  } catch(e){
    savedConfig = null;
  }

  if(savedConfig && savedConfig.player1 && savedConfig.player2
     && typeof savedConfig.player1.padIndex === 'number'
     && typeof savedConfig.player2.padIndex === 'number'){

    let prevButtons = {};
    let replaying = false;

    function pollReplayButton(){
      if(replaying) return;

      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      const checks = [
        { padIndex: savedConfig.player1.padIndex, btnIndex: savedConfig.player1.jumpButton },
        { padIndex: savedConfig.player2.padIndex, btnIndex: savedConfig.player2.jumpButton }
      ];

      checks.forEach(({padIndex, btnIndex}) => {
        const pad = pads[padIndex];
        if(!pad || !pad.buttons[btnIndex]) return;

        const pressed = pad.buttons[btnIndex].pressed;
        const key = padIndex + '_' + btnIndex;
        const wasPressed = prevButtons[key] || false;
        const justPressed = pressed && !wasPressed;
        prevButtons[key] = pressed;

        if(justPressed){
          replaying = true;
          replay();
        }
      });

      if(!replaying) requestAnimationFrame(pollReplayButton);
    }
    requestAnimationFrame(pollReplayButton);
  }
</script>
</body>
</html>
